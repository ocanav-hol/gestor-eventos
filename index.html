// ─── ERROR BOUNDARY ───────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,error:""}; }
  static getDerivedStateFromError(error){ return {hasError:true,error:error?.message||"Error desconocido"}; }
  render(){
    if(this.state.hasError) return(
      <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{textAlign:"center",maxWidth:"400px"}}>
          <div style={{fontSize:"48px",marginBottom:"16px"}}>⚠️</div>
          <div style={{color:"#FF6B9D",fontSize:"18px",fontWeight:"700",marginBottom:"8px"}}>Error al cargar</div>
          <div style={{color:"#666",fontSize:"13px",marginBottom:"20px",fontFamily:"monospace",background:"#111",padding:"12px",borderRadius:"8px"}}>{this.state.error}</div>
          <button type="button" onClick={()=>{localStorage.clear();window.location.reload();}}
            style={{padding:"12px 24px",borderRadius:"10px",border:"none",background:"#FFD700",color:"#000",fontWeight:"800",fontSize:"14px",cursor:"pointer"}}>
            🔄 Limpiar datos y reiniciar
          </button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

// ─── STORAGE ──────────────────────────────────────────────────────
const STORAGE_KEY = "gestor_eventos_v1";

const saveStore = async (store) => {
  const s = JSON.stringify(store);
  try { await window.storage.set(STORAGE_KEY, s); } catch(e) {}
  try { localStorage.setItem(STORAGE_KEY, s); } catch(e) {}
};

const loadStore = async () => {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r?.value) {
      const s = JSON.parse(r.value);
      return { ...s, events: (s.events||[]).map(normalizeEvent) };
    }
  } catch(e) {}
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      return { ...parsed, events: (parsed.events||[]).map(normalizeEvent) };
    }
  } catch(e) {}
  return { events: [] };
};

  const ua = navigator.userAgent;
  if (/android/i.test(ua)) return "android";
  if (/iphone|ipad|ipod/i.test(ua)) return "ios";
  if (/windows/i.test(ua)) return "windows";
  return "mac";
};

// ─── SPOTIFY AUTH (PKCE) ──────────────────────────────────────────
const SCOPES = "streaming user-read-playback-state user-modify-playback-state user-read-email user-read-private playlist-read-private playlist-read-collaborative";

const generateCodeVerifier = () => {
  const array = new Uint8Array(64);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
};

const generateCodeChallenge = async (verifier) => {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
};

const startSpotifyAuth = async (clientId) => {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem("spotify_verifier", verifier);
  const base = window.location.href.split("#")[0].split("?")[0];
  const params = new URLSearchParams({
    client_id: clientId,
    response_type: "code",
    redirect_uri: base,
    scope: SCOPES,
    code_challenge_method: "S256",
    code_challenge: challenge,
  });
  window.location.href = `https://accounts.spotify.com/authorize?${params}`;
};

const exchangeCodeForToken = async (clientId, code) => {
  const verifier = localStorage.getItem("spotify_verifier");
  const base = window.location.href.split("#")[0].split("?")[0];
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: clientId,
      grant_type: "authorization_code",
      code,
      redirect_uri: base,
      code_verifier: verifier,
    }),
  });
  const data = await res.json();
  localStorage.removeItem("spotify_verifier");
  return data.access_token;
};

const parseAuthCode = () => {
  const p = new URLSearchParams(window.location.search);
  return p.get("code");
};

const spApi = async (token, method, path, body) => {
  const res = await fetch(`https://api.spotify.com/v1${path}`,{method,headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:body!==undefined?JSON.stringify(body):undefined});
  if(res.status===204||res.status===202) return {};
  if(res.status===401) throw new Error("TOKEN_EXPIRED");
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
  return res.json().catch(()=>({}));
};

// ─── DEBOUNCED INPUT ──────────────────────────────────────────────
// Guarda al padre cuando el usuario sale del campo (onBlur)
// Así nunca pierde el foco mientras se escribe
function DebouncedInput({value, onChange, delay=0, ...props}){
  const [local,setLocal]=useState(value??'');
  const ref=useRef(null);
  const dirty=useRef(false);

  useEffect(()=>{
    if(document.activeElement!==ref.current) setLocal(value??'');
  },[value]);

  return <input
    ref={ref}
    {...props}
    value={local}
    onChange={e=>{ setLocal(e.target.value); dirty.current=true; }}
    onBlur={()=>{ if(dirty.current){ dirty.current=false; onChange(local); } }}
    translate="no"
    lang="es"
    spellCheck={false}
    autoCorrect="off"
    autoCapitalize="off"
  />;
}

function DebouncedTextarea({value, onChange, delay=0, ...props}){
  const [local,setLocal]=useState(value??'');
  const ref=useRef(null);
  const dirty=useRef(false);

  useEffect(()=>{
    if(document.activeElement!==ref.current) setLocal(value??'');
  },[value]);

  return <textarea
    ref={ref}
    {...props}
    value={local}
    onChange={e=>{ setLocal(e.target.value); dirty.current=true; }}
    onBlur={()=>{ if(dirty.current){ dirty.current=false; onChange(local); } }}
    translate="no"
    lang="es"
    spellCheck={false}
    autoCorrect="off"
  />;
}

// ─── WATERMARK ────────────────────────────────────────────────────
function Watermark({event,screen}){
  const wm=event?.watermark;
  if(!wm?.enabled) return null;
  if(wm.onlyHome&&screen!=="event-home") return null;
  const op=wm.intensity==="fuerte"?"66":wm.intensity==="media"?"3a":"1e";
  return <div style={{position:"fixed",bottom:"14px",right:"16px",zIndex:999,color:`#ffffff${op}`,fontSize:"12px",fontWeight:"500",letterSpacing:"0.5px",pointerEvents:"none",userSelect:"none",whiteSpace:"nowrap",textShadow:"0 1px 4px #00000066"}}>{wm.text}</div>;
}

// ─── CONFETTI ─────────────────────────────────────────────────────
function Confetti(){
  const items=Array.from({length:18},(_,i)=>({id:i,left:`${Math.random()*100}%`,delay:`${Math.random()*4}s`,dur:`${4+Math.random()*4}s`,color:["#FFD700","#FF6B9D","#74C2E1","#A8FF78","#FF8C00"][i%5],size:`${6+Math.random()*8}px`}));
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>{items.map(p=><div key={p.id} style={{position:"absolute",left:p.left,top:"-20px",width:p.size,height:p.size,background:p.color,borderRadius:p.id%2===0?"50%":"2px",animation:`fall ${p.dur} ${p.delay} infinite linear`,opacity:.6}}/>)}</div>;
}

function Clock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);
  return <div style={{fontSize:"12px",color:"#555",letterSpacing:"2px",fontFamily:"monospace"}}>{t.toLocaleTimeString("es-AR")}</div>;
}

            style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"center",gap:"10px",padding:"16px",background:"linear-gradient(135deg,#1a1500,#2a2000)",border:"2px dashed #FFD70066",borderRadius:"14px",cursor:"pointer",marginBottom:"20px"}}>

// ─── DJ MODE ──────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════
function DJMode({event,spotifyToken,onExpiredToken}){
  const [stepIdx,setStepIdx]=useState(0);
  const [autoMode,setAutoMode]=useState(false);
  const [playing,setPlaying]=useState(false);
  const [nowPlaying,setNowPlaying]=useState(null);
  const [devices,setDevices]=useState([]);
  const [deviceId,setDeviceId]=useState("");
  const [spError,setSpError]=useState("");
  const [loading,setLoading]=useState("");
  const [countdown,setCountdown]=useState(null);
  const countRef=useRef(null);

  const steps=event.schedule||[];
  const step=steps[stepIdx]||steps[0];
  const nextStep=steps[stepIdx+1]||null;
  const playlist=(event.playlists||[]).find(p=>p.id===step?.playlistId)||null;

  useEffect(()=>{
    if(!spotifyToken) return;
    const poll=async()=>{try{const s=await spApi(spotifyToken,"GET","/me/player");if(s?.item){setNowPlaying({title:s.item.name,artist:s.item.artists?.map(a=>a.name).join(", "),playing:s.is_playing});setPlaying(s.is_playing);}}catch(e){if(e.message==="TOKEN_EXPIRED")onExpiredToken();}};
    poll(); const i=setInterval(poll,5000); return()=>clearInterval(i);
  },[spotifyToken,stepIdx]);

  useEffect(()=>{
    if(!spotifyToken) return;
    spApi(spotifyToken,"GET","/me/player/devices").then(d=>{const devs=d?.devices||[];setDevices(devs);const a=devs.find(d=>d.is_active)||devs[0];if(a)setDeviceId(a.id);}).catch(()=>{});
  },[spotifyToken]);

  useEffect(()=>{
    if(!autoMode||!nextStep){clearInterval(countRef.current);setCountdown(null);return;}
    const total=(timeToMins(nextStep.time)-timeToMins(step.time))*60;
    setCountdown(total);
    countRef.current=setInterval(()=>setCountdown(p=>{if(p<=1){clearInterval(countRef.current);setStepIdx(i=>Math.min(i+1,steps.length-1));return null;}return p-1;}),1000);
    return()=>clearInterval(countRef.current);
  },[autoMode,stepIdx]);

  const callApi=async(fn)=>{setSpError("");setLoading("...");try{await fn();}catch(e){if(e.message==="TOKEN_EXPIRED"){onExpiredToken();return;}setSpError(e.message);}finally{setLoading("");}};
  const fmtCD=(s)=>s?`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`:"";
  const plColor=playlist?.color||"#FFD700";
  const isConn=!!spotifyToken;

  const playPl=async(pl)=>{if(!isConn) return;await callApi(async()=>{const body=pl?.spotifyUri?{context_uri:pl.spotifyUri}:{};await spApi(spotifyToken,"PUT",deviceId?`/me/player/play?device_id=${deviceId}`:"/me/player/play",body);setPlaying(true);});};
  const togglePP=()=>callApi(async()=>{if(playing){await spApi(spotifyToken,"PUT","/me/player/pause");setPlaying(false);}else{await spApi(spotifyToken,"PUT","/me/player/play");setPlaying(true);}});
  const skip=()=>callApi(async()=>await spApi(spotifyToken,"POST","/me/player/next"));
  const prev=()=>callApi(async()=>await spApi(spotifyToken,"POST","/me/player/previous"));
  const goTo=async(i)=>{setStepIdx(i);const pl=(event.playlists||[]).find(p=>p.id===steps[i].playlistId);if(pl&&isConn)await playPl(pl);};

  return(
    <div style={{padding:"0 0 40px"}}>
      {!isConn&&<div style={{margin:"16px",padding:"14px",background:"#1a0a00",border:"1px solid #FF8C0066",borderRadius:"12px"}}><div style={{color:"#FF8C00",fontWeight:"700",marginBottom:"4px"}}>⚠️ Spotify no conectado</div><div style={{color:"#888",fontSize:"13px"}}>Configuración → 🎵 Spotify</div></div>}
      <div style={{display:"flex",gap:"8px",padding:"14px 16px 0"}}>
        <button type="button" translate="no" onClick={()=>setAutoMode(false)} style={{flex:1,padding:"10px",borderRadius:"10px",border:`1.5px solid ${!autoMode?"#FFD700":"#333"}`,background:!autoMode?"#FFD70022":"transparent",color:!autoMode?"#FFD700":"#555",fontWeight:"700",fontSize:"13px",cursor:"pointer",fontFamily:"inherit"}}>👆 Manual</button>
        <button type="button" translate="no" onClick={()=>setAutoMode(true)} style={{flex:1,padding:"10px",borderRadius:"10px",border:`1.5px solid ${autoMode?"#1DB954":"#333"}`,background:autoMode?"#1DB95422":"transparent",color:autoMode?"#1DB954":"#555",fontWeight:"700",fontSize:"13px",cursor:"pointer",fontFamily:"inherit"}}>🤖 Automático</button>
      </div>
      <div style={{margin:"14px 16px 0",background:`linear-gradient(135deg,${plColor}18,#0d0d0d)`,border:`2px solid ${plColor}55`,borderRadius:"18px",padding:"20px"}}>
        <div style={{color:plColor,fontSize:"11px",fontWeight:"700",letterSpacing:"3px",marginBottom:"6px"}}>{autoMode&&countdown?`⏱ AUTO · EN ${fmtCD(countdown)}`:"AHORA"}</div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
          <span style={{fontSize:"28px"}}>{step?.icon}</span>
          <div><div style={{color:"#fff",fontSize:"17px",fontWeight:"800"}}>{step?.label}</div><div style={{color:"#888",fontSize:"12px"}}>{step?.time} hs · {step?.detail}</div></div>
        </div>
        {playlist&&<div style={{display:"inline-flex",alignItems:"center",gap:"8px",padding:"6px 12px",background:`${plColor}22`,border:`1px solid ${plColor}44`,borderRadius:"20px"}}><div style={{width:"8px",height:"8px",borderRadius:"50%",background:playing?plColor:"#555",animation:playing?"pulse 1s infinite":"none"}}/><span style={{color:plColor,fontWeight:"700",fontSize:"13px"}}>{playlist.name}</span></div>}
      </div>
      {nowPlaying&&<div style={{margin:"10px 16px 0",display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",background:"#111",border:"1px solid #1DB95433",borderRadius:"12px"}}><div style={{width:"10px",height:"10px",borderRadius:"50%",background:nowPlaying.playing?"#1DB954":"#555",flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{color:"#fff",fontSize:"13px",fontWeight:"600",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nowPlaying.title}</div><div style={{color:"#666",fontSize:"11px"}}>{nowPlaying.artist}</div></div><div style={{color:"#1DB954",fontSize:"11px",fontWeight:"700"}}>{nowPlaying.playing?"▶":"⏸"}</div></div>}
      {spError&&<div style={{margin:"8px 16px 0",padding:"10px",background:"#1a0000",border:"1px solid #ff444433",borderRadius:"10px",color:"#ff6666",fontSize:"12px"}}>⚠️ {spError}</div>}
      <div style={{margin:"14px 16px 0",display:"flex",gap:"8px"}}>
        <button type="button" translate="no" onClick={prev} disabled={!isConn} style={{...S.btn("#888"),padding:"12px 14px",fontSize:"18px",opacity:isConn?1:.3}}>⏮</button>
        <button type="button" translate="no" onClick={togglePP} disabled={!isConn} style={{flex:1,padding:"14px",borderRadius:"12px",border:"none",background:playing?"#1DB954":"#FFD700",color:"#000",fontWeight:"900",fontSize:"18px",cursor:"pointer",opacity:isConn?1:.3}}>{loading||( playing?"⏸":"▶")}</button>
        <button type="button" translate="no" onClick={skip} disabled={!isConn} style={{...S.btn("#888"),padding:"12px 14px",fontSize:"18px",opacity:isConn?1:.3}}>⏭</button>
      </div>
      {playlist&&<div style={{margin:"10px 16px 0"}}><button type="button" translate="no" onClick={()=>playPl(playlist)} disabled={!isConn} style={{...S.btnFill(playlist.color),width:"100%",padding:"12px",opacity:isConn?1:.4}}>▶ Reproducir {playlist.name}</button></div>}
      {isConn&&devices.length>0&&<div style={{margin:"10px 16px 0"}}><div style={{color:"#555",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"6px"}}>DISPOSITIVO</div><div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>{devices.map(d=><button type="button" translate="no" key={d.id} onClick={()=>setDeviceId(d.id)} style={{padding:"7px 12px",borderRadius:"8px",border:`1.5px solid ${deviceId===d.id?"#1DB954":"#333"}`,background:deviceId===d.id?"#1DB95422":"transparent",color:deviceId===d.id?"#1DB954":"#666",fontSize:"12px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"}}>{d.type==="Smartphone"?"📱":d.type==="Computer"?"💻":"🔊"} {d.name}</button>)}</div></div>}
      <div style={{margin:"16px 16px 0"}}>
        <div style={{color:"#555",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"10px"}}>CRONOGRAMA</div>
        {steps.map((s,i)=>{const pl=(event.playlists||[]).find(p=>p.id===s.playlistId);const isCur=i===stepIdx;return(
          <button type="button" translate="no" key={s.id} onClick={()=>!autoMode&&goTo(i)} style={{display:"flex",width:"100%",alignItems:"center",gap:"12px",padding:"11px 14px",background:isCur?`${pl?.color||"#FFD700"}18`:"transparent",border:`1px solid ${isCur?pl?.color||"#FFD700":"#1a1a1a"}`,borderRadius:"10px",marginBottom:"4px",cursor:autoMode?"default":"pointer",textAlign:"left",fontFamily:"inherit",opacity:i<stepIdx?.4:1}}>
            <span style={{fontSize:"18px",flexShrink:0}}>{s.icon}</span>
            <div style={{flex:1,minWidth:0}}><div style={{color:isCur?pl?.color||"#FFD700":"#fff",fontSize:"13px",fontWeight:isCur?"800":"500",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.time} · {s.label}</div>{pl&&<div style={{color:"#555",fontSize:"11px"}}>{pl.name}</div>}</div>
            {isCur&&<div style={{color:pl?.color||"#FFD700",fontSize:"11px",fontWeight:"700"}}>← ACTUAL</div>}
          </button>
        );})}
      </div>
      {!autoMode&&<div style={{margin:"12px 16px 0",display:"flex",gap:"10px"}}><button type="button" translate="no" onClick={()=>setStepIdx(i=>Math.max(i-1,0))} disabled={stepIdx===0} style={{...S.btn("#888"),flex:1,opacity:stepIdx===0?.3:1}}>◀ Anterior</button><button type="button" translate="no" onClick={()=>goTo(Math.min(stepIdx+1,steps.length-1))} disabled={stepIdx===steps.length-1} style={{...S.btnFill("#FFD700"),flex:1,opacity:stepIdx===steps.length-1?.3:1}}>Siguiente ▶</button></div>}
    </div>
  );
}

function KaraokePage(){
  const [genre,setGenre]=useState("cumbia");
  const [tab,setTab]=useState("songs");

  const [singing,setSinging]=useState(null);
  const [timer,setTimer]=useState(0);
  const [running,setRunning]=useState(false);
  const [newName,setNewName]=useState("");

  useEffect(()=>{if(running)timerRef.current=setInterval(()=>setTimer(t=>t+1),1000);else clearInterval(timerRef.current);return()=>clearInterval(timerRef.current);},[running]);

        {[["songs","🎤 Canciones"],["queue","👥 Turnos"]].map(([id,label])=>(<button type="button" translate="no" key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"12px",border:"none",borderBottom:`2px solid ${tab===id?"#C39BD3":"transparent"}`,background:"transparent",color:tab===id?"#C39BD3":"#555",fontWeight:"700",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>{label}</button>))}

        <div style={{padding:"16px"}}>
          <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px",marginBottom:"14px"}}>
            {Object.entries(KARAOKE_SONGS).map(([id,g])=>(<button type="button" translate="no" key={id} onClick={()=>setGenre(id)} style={{padding:"7px 12px",borderRadius:"20px",border:`1.5px solid ${genre===id?g.color:"#333"}`,background:genre===id?`${g.color}22`:"transparent",color:genre===id?g.color:"#555",fontWeight:"700",fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{g.label}</button>))}

        </div>
      )}
      {tab==="queue"&&(
        <div style={{padding:"16px"}}>
          {singing&&(<div style={{marginBottom:"16px",padding:"18px",background:"linear-gradient(135deg,#1a0030,#300050)",border:"2px solid #C39BD3",borderRadius:"16px",textAlign:"center"}}>
            <div style={{color:"#C39BD3",fontSize:"11px",fontWeight:"700",letterSpacing:"3px",marginBottom:"8px"}}>🎤 CANTANDO AHORA</div>
            <div style={{color:"#fff",fontSize:"22px",fontWeight:"900",marginBottom:"6px"}}>{singing.name}</div>
            <div style={{color:"#C39BD3",fontSize:"32px",fontWeight:"900",fontFamily:"monospace",marginBottom:"14px"}}>{fmt(timer)}</div>
            <div style={{display:"flex",gap:"8px",justifyContent:"center"}}>
              <button type="button" translate="no" onClick={()=>setRunning(r=>!r)} style={{padding:"10px 20px",borderRadius:"10px",border:"none",background:running?"#555":"#1DB954",color:"#fff",fontWeight:"800",cursor:"pointer"}}>{running?"⏸ Pausar":"▶ Reanudar"}</button>
              <button type="button" translate="no" onClick={()=>{setRunning(false);setSinging(null);setQueue(q=>q.filter(p=>p.id!==singing?.id));}} style={{padding:"10px 20px",borderRadius:"10px",border:"none",background:"#FF6B9D",color:"#fff",fontWeight:"800",cursor:"pointer"}}>✅ Terminó</button>
            </div>

            <div style={{color:"#C39BD3",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"10px"}}>➕ AGREGAR</div>
            <div style={{display:"flex",gap:"8px"}}>
              <input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,flex:1}} placeholder="Nombre" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&newName.trim()&&(setQueue(q=>[...q,{id:uid(),name:newName.trim()}]),setNewName(""))}/>

          </div>))}
        </div>
      )}
    </div>
  );
}
// ─── SEND TASK PANEL ──────────────────────────────────────────────
function SendTaskPanel({task, collab, totalCost, fmt$, fmtDate}){
  if(!collab) return null;
  const tc=totalCost(task.items||[]);
  const lines=[
    `📋 *${task.title}*`,
    `📅 Fecha: ${fmtDate(task.date)||"Sin fecha"}`,
    `⚡ Prioridad: ${task.priority||"media"}`,
    task.notes?`📝 ${task.notes}`:"",
    (task.items||[]).length>0?"":"",
    (task.items||[]).length>0?"*Lista de ítems:*":"",
    ...(task.items||[]).map((it,i)=>`${i+1}. ${it.desc} — ${it.qty} ${it.unit}${it.estimatedCost?` ($${Number(it.estimatedCost).toLocaleString("es-AR")})`:""}`),
    tc>0?`\n💰 Total estimado: ${fmt$(tc)}`:"",
  ].filter(Boolean);
  const taskText=lines.join("\n");
  const waNum=(collab.whatsapp||"").replace(/\D/g,"");
  const waUrl=waNum?`https://wa.me/${waNum}?text=${encodeURIComponent(taskText)}`:"";
  const mailUrl=collab.email?`mailto:${collab.email}?subject=${encodeURIComponent("Tarea: "+task.title)}&body=${encodeURIComponent(taskText)}`:"";
  if(!waUrl&&!mailUrl) return null;
  return(
    <div style={{marginTop:"12px",padding:"14px",background:"#111",border:"1px solid #25D36633",borderRadius:"12px"}}>
      <div style={{color:"#25D366",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"10px"}}>📤 ENVIAR A {collab.name.toUpperCase()}</div>
      <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
        {waUrl&&<a href={waUrl} target="_blank" rel="noopener noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"12px",background:"#25D36622",border:"1px solid #25D36644",borderRadius:"10px",color:"#25D366",fontWeight:"800",fontSize:"13px",textDecoration:"none"}}>💬 WhatsApp</a>}
        {mailUrl&&<a href={mailUrl} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"12px",background:"#74C2E122",border:"1px solid #74C2E144",borderRadius:"10px",color:"#74C2E1",fontWeight:"800",fontSize:"13px",textDecoration:"none"}}>✉️ Email</a>}
      </div>
      <div style={{color:"#555",fontSize:"11px"}}>Envía título, fecha, ítems y costo estimado.</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// ─── TASKS PAGE ───────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════
function TasksPage({event,onChange}){
  const [view,setView]=useState("list");
  const [selectedId,setSelectedId]=useState(null);
  const [fStatus,setFStatus]=useState("all");
  const [fCollab,setFCollab]=useState("all");
  const [fDate,setFDate]=useState("");
  const [newItem,setNewItem]=useState({desc:"",qty:"",unit:"",estimatedCost:""});

  const tasks=event.tasks||[];
  const collabs=event.collaborators||[];
  const upd=(t)=>onChange({...event,tasks:t});
  const updTask=(id,k,v)=>upd(tasks.map(t=>t.id===id?{...t,[k]:v}:t));
  const toggleStatus=(id)=>updTask(id,"status",tasks.find(t=>t.id===id)?.status==="completed"?"pending":"completed");
  const deleteTask=(id)=>{upd(tasks.filter(t=>t.id!==id));setView("list");};
  const addTask=()=>{const t={id:uid(),title:"Nueva tarea",date:event.eventDate||"",status:"pending",collaboratorId:"",priority:"media",notes:"",items:[]};upd([...tasks,t]);};
  const selTask=tasks.find(t=>t.id===selectedId);
  const updCollab=(id,k,v)=>onChange({...event,collaborators:collabs.map(c=>c.id===id?{...c,[k]:v}:c)});
  const delCollab=(id)=>onChange({...event,collaborators:collabs.filter(c=>c.id!==id)});
  const addCollab=()=>onChange({...event,collaborators:[...collabs,{id:uid(),name:"Colaborador",role:"",phone:""}]});

  const addItem=(taskId)=>{
    if(!newItem.desc.trim()) return;
    const item={id:uid(),desc:newItem.desc,qty:parseFloat(newItem.qty)||1,unit:newItem.unit||"unidad",estimatedCost:parseFloat(newItem.estimatedCost)||0};
    upd(tasks.map(t=>t.id===taskId?{...t,items:[...t.items,item]}:t));
    setNewItem({desc:"",qty:"",unit:"",estimatedCost:""});
  };
  const removeItem=(taskId,itemId)=>upd(tasks.map(t=>t.id===taskId?{...t,items:t.items.filter(i=>i.id!==itemId)}:t));
  const updItem=(taskId,itemId,k,v)=>upd(tasks.map(t=>t.id===taskId?{...t,items:t.items.map(i=>i.id===itemId?{...i,[k]:v}:i)}:t));

  const totalCost=(items)=>(items||[]).reduce((s,i)=>s+(parseFloat(i.estimatedCost)||0),0);
  const grandTotal=tasks.reduce((s,t)=>s+totalCost(t.items),0);
  const collab=(id)=>collabs.find(c=>c.id===id);

  const filtered=tasks.filter(t=>{
    if(fStatus!=="all"&&t.status!==fStatus) return false;
    if(fCollab!=="all"&&t.collaboratorId!==fCollab) return false;
    if(fDate&&t.date!==fDate) return false;
    return true;
  }).sort((a,b)=>(a.date||"").localeCompare(b.date||""));

  // ── DETAIL VIEW ──
  if(view==="detail"&&selTask){
    const tc=totalCost(selTask.items);
    return(
      <div style={{padding:"0 0 40px"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid #1a1a1a",display:"flex",gap:"10px",alignItems:"center"}}>
          <button type="button" translate="no" onClick={()=>setView("list")} style={{background:"none",border:"none",color:"#FFD700",fontSize:"22px",cursor:"pointer"}}>←</button>
          <div style={{flex:1,color:"#fff",fontWeight:"700",fontSize:"15px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selTask.title}</div>
          <button type="button" translate="no" onClick={()=>toggleStatus(selTask.id)} style={{padding:"6px 12px",borderRadius:"20px",border:"none",background:selTask.status==="completed"?"#1DB95433":"#FFD70033",color:selTask.status==="completed"?"#1DB954":"#FFD700",fontWeight:"700",fontSize:"11px",cursor:"pointer"}}>{selTask.status==="completed"?"✅ Hecha":"⏳ Pendiente"}</button>
        </div>
        <div style={{padding:"16px"}}>
          <div style={{...S.card(`${PRIORITY_COLORS[selTask.priority]}33`),marginBottom:"14px"}}>
            <DebouncedInput style={{...S.input,fontSize:"16px",fontWeight:"700",marginBottom:"10px",border:"none",background:"transparent",padding:"0"}} value={selTask.title} onChange={v=>updTask(selTask.id,"title",v)}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
              <div><label style={S.label}>Fecha</label><input translate="no" spellCheck={false} autoCorrect="off" type="date" style={{...S.input,colorScheme:"dark"}} value={selTask.date||""} onChange={e=>updTask(selTask.id,"date",e.target.value)}/></div>
              <div><label style={S.label}>Prioridad</label>
                <div style={{display:"flex",gap:"4px"}}>
                  {["alta","media","baja"].map(p=>(<button type="button" translate="no" key={p} onClick={()=>updTask(selTask.id,"priority",p)} style={{flex:1,padding:"8px 4px",borderRadius:"6px",border:`1px solid ${selTask.priority===p?PRIORITY_COLORS[p]:"#333"}`,background:selTask.priority===p?`${PRIORITY_COLORS[p]}22`:"transparent",color:selTask.priority===p?PRIORITY_COLORS[p]:"#555",fontSize:"11px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>{p}</button>))}
                </div>
              </div>
            </div>
            <label style={S.label}>Colaborador</label>
            <select translate="no" style={{...S.input,marginBottom:"10px"}} value={selTask.collaboratorId||""} onChange={e=>updTask(selTask.id,"collaboratorId",e.target.value)}>
              <option value="">— Sin asignar —</option>
              {collabs.map(c=><option key={c.id} value={c.id}>{c.name} · {c.role}</option>)}
            </select>
            <label style={S.label}>Notas</label>
            <DebouncedInput style={S.input} value={selTask.notes||""} onChange={v=>updTask(selTask.id,"notes",v)} placeholder="Notas adicionales..."/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{color:"#888",fontSize:"11px",fontWeight:"700",letterSpacing:"2px"}}>ÍTEMS ({selTask.items.length})</div>
            {tc>0&&<div style={{color:"#A8FF78",fontWeight:"800",fontSize:"14px"}}>{fmt$(tc)}</div>}
          </div>
          {selTask.items.length===0&&<div style={{color:"#333",fontSize:"13px",textAlign:"center",padding:"16px 0"}}>Sin ítems. Agregá el primero abajo 👇</div>}
          {selTask.items.map(item=>(
            <div key={item.id} style={{display:"flex",alignItems:"center",gap:"6px",padding:"10px 12px",marginBottom:"5px",background:"#111",borderRadius:"10px",border:"1px solid #1a1a1a"}}>
              <div style={{flex:1,minWidth:0}}>
                <DebouncedInput style={{...S.input,padding:"4px 6px",fontSize:"13px",fontWeight:"600",border:"none",background:"transparent",marginBottom:"4px"}} value={item.desc} onChange={v=>updItem(selTask.id,item.id,"desc",v)}/>
                <div style={{display:"flex",gap:"6px"}}>
                  <input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,width:"52px",padding:"4px 6px",fontSize:"12px",textAlign:"center"}} type="number" value={item.qty} onChange={e=>updItem(selTask.id,item.id,"qty",e.target.value)}/>
                  <DebouncedInput style={{...S.input,flex:1,padding:"4px 6px",fontSize:"12px"}} value={item.unit} onChange={v=>updItem(selTask.id,item.id,"unit",v)} placeholder="unidad"/>
                  <div style={{display:"flex",alignItems:"center",gap:"3px"}}><span style={{color:"#555",fontSize:"12px"}}>$</span><input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,width:"70px",padding:"4px 6px",fontSize:"12px"}} type="number" value={item.estimatedCost} onChange={e=>updItem(selTask.id,item.id,"estimatedCost",e.target.value)}/></div>
                </div>
              </div>
              <button type="button" translate="no" onClick={()=>removeItem(selTask.id,item.id)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:"18px",flexShrink:0}}>✕</button>
            </div>
          ))}
          <div style={{marginTop:"12px",padding:"14px",background:"#111",border:"1.5px dashed #A8FF7844",borderRadius:"12px"}}>
            <div style={{color:"#A8FF78",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"10px"}}>➕ AGREGAR ÍTEM</div>
            <input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,marginBottom:"6px"}} placeholder="Descripción *" value={newItem.desc} onChange={e=>setNewItem(p=>({...p,desc:e.target.value}))}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"10px"}}>
              <input translate="no" spellCheck={false} autoCorrect="off" style={S.input} type="number" placeholder="Cant." value={newItem.qty} onChange={e=>setNewItem(p=>({...p,qty:e.target.value}))}/>
              <input translate="no" spellCheck={false} autoCorrect="off" style={S.input} placeholder="Unidad" value={newItem.unit} onChange={e=>setNewItem(p=>({...p,unit:e.target.value}))}/>
              <div style={{display:"flex",alignItems:"center",gap:"3px"}}><span style={{color:"#555",fontSize:"13px"}}>$</span><input translate="no" spellCheck={false} autoCorrect="off" style={S.input} type="number" placeholder="Costo" value={newItem.estimatedCost} onChange={e=>setNewItem(p=>({...p,estimatedCost:e.target.value}))}/></div>
            </div>
            <button type="button" translate="no" onClick={()=>addItem(selTask.id)} style={{...S.btnFill("#A8FF78"),width:"100%",padding:"11px"}}>Agregar ítem</button>
          </div>
          <button type="button" translate="no" onClick={()=>deleteTask(selTask.id)} style={{...S.btn("#ff4444"),width:"100%",marginTop:"16px",padding:"12px"}}>🗑 Eliminar tarea</button>
          <SendTaskPanel task={selTask} collab={collab(selTask.collaboratorId)} totalCost={totalCost} fmt$={fmt$} fmtDate={fmtDate}/>
        </div>
      </div>
    );
  }

  // ── COLLABORATORS VIEW ──
  if(view==="collab"){return(
    <div style={{padding:"16px 16px 40px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <div style={{color:"#888",fontSize:"11px",fontWeight:"700",letterSpacing:"2px"}}>COLABORADORES ({collabs.length})</div>
        <button type="button" translate="no" onClick={addCollab} style={S.btnFill("#FF6B9D")}>+ Agregar</button>
      </div>
      {collabs.map(c=>(
        <div key={c.id} style={{...S.card("#FF6B9D22"),marginBottom:"10px"}}>
          <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
            <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"#FF6B9D33",border:"1px solid #FF6B9D44",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF6B9D",fontWeight:"900",fontSize:"15px",flexShrink:0}}>{c.name?.charAt(0)?.toUpperCase()||"?"}</div>
            <DebouncedInput style={{...S.input,flex:1,fontWeight:"700"}} value={c.name} onChange={v=>updCollab(c.id,"name",v)} placeholder="Nombre"/>
            <button type="button" translate="no" onClick={()=>delCollab(c.id)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:"18px"}}>✕</button>
          </div>
          <DebouncedInput style={{...S.input,marginBottom:"6px"}} value={c.role||""} onChange={v=>updCollab(c.id,"role",v)} placeholder="Rol / responsabilidad"/>
          <DebouncedInput style={{...S.input,marginBottom:"6px"}} value={c.whatsapp||""} onChange={v=>updCollab(c.id,"whatsapp",v)} placeholder="WhatsApp (ej: 5491112345678)" type="tel"/>
          <DebouncedInput style={{...S.input,marginBottom:"8px"}} value={c.email||""} onChange={v=>updCollab(c.id,"email",v)} placeholder="Email" type="email"/>
          {/* Quick contact buttons */}
          <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
            {c.whatsapp&&<a href={`https://wa.me/${c.whatsapp.replace(/\D/g,"")}`} target="_blank" rel="noopener noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"8px",background:"#25D36622",border:"1px solid #25D36644",borderRadius:"8px",color:"#25D366",fontWeight:"700",fontSize:"12px",textDecoration:"none"}}>💬 WhatsApp</a>}
            {c.email&&<a href={`mailto:${c.email}`} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"8px",background:"#74C2E122",border:"1px solid #74C2E144",borderRadius:"8px",color:"#74C2E1",fontWeight:"700",fontSize:"12px",textDecoration:"none"}}>✉️ Email</a>}
          </div>
          <div style={{color:"#666",fontSize:"11px"}}>{tasks.filter(t=>t.collaboratorId===c.id).length} tareas asignadas</div>
        </div>
      ))}
    </div>
  );}

  // ── LIST VIEW ──
  return(
    <div style={{padding:"0 0 40px"}}>
      <div style={{display:"flex",borderBottom:"1px solid #1a1a1a"}}>
        <button type="button" translate="no" onClick={()=>setView("list")} style={{flex:1,padding:"12px",border:"none",borderBottom:`2px solid ${view==="list"?"#A8FF78":"transparent"}`,background:"transparent",color:view==="list"?"#A8FF78":"#555",fontWeight:"700",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>📋 Tareas ({tasks.length})</button>
        <button type="button" translate="no" onClick={()=>setView("collab")} style={{flex:1,padding:"12px",border:"none",borderBottom:`2px solid ${view==="collab"?"#FF6B9D":"transparent"}`,background:"transparent",color:view==="collab"?"#FF6B9D":"#555",fontWeight:"700",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>👥 Colaboradores ({collabs.length})</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",padding:"14px 16px 0"}}>
        {[{label:"Pendientes",value:tasks.filter(t=>t.status==="pending").length,color:"#FFD700"},{label:"Completadas",value:tasks.filter(t=>t.status==="completed").length,color:"#1DB954"},{label:"Total est.",value:fmt$(grandTotal),color:"#A8FF78"}].map((s,i)=>(
          <div key={i} style={{padding:"10px",background:"#111",border:`1px solid ${s.color}33`,borderRadius:"10px",textAlign:"center"}}><div style={{color:s.color,fontWeight:"900",fontSize:"15px"}}>{s.value}</div><div style={{color:"#555",fontSize:"10px",marginTop:"2px"}}>{s.label}</div></div>
        ))}
      </div>
      <div style={{padding:"12px 16px 0",display:"flex",gap:"6px",flexWrap:"wrap"}}>
        <select translate="no" style={{...S.input,flex:1,minWidth:"90px",padding:"7px 10px",fontSize:"12px"}} value={fStatus} onChange={e=>setFStatus(e.target.value)}><option value="all">Todos</option><option value="pending">Pendientes</option><option value="completed">Completadas</option></select>
        <select translate="no" style={{...S.input,flex:1,minWidth:"90px",padding:"7px 10px",fontSize:"12px"}} value={fCollab} onChange={e=>setFCollab(e.target.value)}><option value="all">Todos</option>{collabs.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
        <input translate="no" spellCheck={false} autoCorrect="off" type="date" style={{...S.input,flex:1,minWidth:"110px",padding:"7px 10px",fontSize:"12px",colorScheme:"dark"}} value={fDate} onChange={e=>setFDate(e.target.value)}/>
        {(fStatus!=="all"||fCollab!=="all"||fDate)&&<button type="button" translate="no" onClick={()=>{setFStatus("all");setFCollab("all");setFDate("");}} style={{...S.btn("#888"),padding:"7px 10px",fontSize:"12px"}}>✕</button>}
      </div>
      <div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
          <div style={{color:"#555",fontSize:"11px",fontWeight:"700",letterSpacing:"2px"}}>{filtered.length} TAREAS</div>
          <button type="button" translate="no" onClick={addTask} style={S.btnFill("#A8FF78")}>+ Nueva</button>
        </div>
        {filtered.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#333",fontSize:"13px"}}>Sin tareas con ese filtro</div>}
        {filtered.map(task=>{
          const tc=totalCost(task.items);const cl=collab(task.collaboratorId);
          return(<div key={task.id} style={{padding:"13px 14px",marginBottom:"8px",background:"#111",border:`1px solid ${task.status==="completed"?"#1DB95433":PRIORITY_COLORS[task.priority]+"33"}`,borderRadius:"12px",borderLeft:`4px solid ${task.status==="completed"?"#1DB954":PRIORITY_COLORS[task.priority]}`,opacity:task.status==="completed"?.65:1}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:"10px"}}>
              <button type="button" translate="no" onClick={()=>toggleStatus(task.id)} style={{width:"22px",height:"22px",borderRadius:"50%",border:`2px solid ${task.status==="completed"?"#1DB954":"#444"}`,background:task.status==="completed"?"#1DB954":"transparent",cursor:"pointer",flexShrink:0,marginTop:"1px",display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontSize:"11px"}}>{task.status==="completed"?"✓":""}</button>
              <div style={{flex:1,minWidth:0}} onClick={()=>{setSelectedId(task.id);setView("detail");}}>
                <div style={{color:task.status==="completed"?"#555":"#fff",fontWeight:"700",fontSize:"14px",textDecoration:task.status==="completed"?"line-through":"none",marginBottom:"4px"}}>{task.title}</div>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}}>
                  {task.date&&<span style={{color:"#666",fontSize:"11px"}}>📅 {fmtDate(task.date)}</span>}
                  {cl&&<span style={{color:"#888",fontSize:"11px"}}>👤 {cl.name}</span>}
                  {(task.items||[]).length>0&&<span style={{color:"#888",fontSize:"11px"}}>📦 {task.items.length} ítems</span>}
                  {tc>0&&<span style={{color:"#A8FF78",fontSize:"11px",fontWeight:"700"}}>{fmt$(tc)}</span>}
                </div>
              </div>
              <div style={{color:"#333",fontSize:"16px"}}>›</div>
            </div>
          </div>);
        })}
        {grandTotal>0&&<div style={{marginTop:"8px",padding:"12px 16px",background:"#0d1a0d",border:"1px solid #A8FF7833",borderRadius:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{color:"#888",fontSize:"13px"}}>Total estimado</div><div style={{color:"#A8FF78",fontWeight:"900",fontSize:"18px"}}>{fmt$(grandTotal)}</div></div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// ─── TIMELINE ─────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════
function TimelinePage({event}){
  return(
    <div style={{padding:"20px"}}>
      <div style={{textAlign:"center",marginBottom:"24px"}}>
        <div style={{color:"#FFD700",fontSize:"11px",fontWeight:"700",letterSpacing:"3px",marginBottom:"4px"}}>PROGRAMA</div>
        <div style={{color:"#fff",fontSize:"18px",fontWeight:"800"}}>{event.name}</div>
        {event.location&&<div style={{color:"#666",fontSize:"12px",marginTop:"4px"}}>📍 {event.location}</div>}
        <div style={{color:"#555",fontSize:"12px",marginTop:"2px"}}>{event.timeFrom} – {event.timeTo} hs</div>
      </div>
      {(event.schedule||[]).map((item,i)=>{
        const pl=(event.playlists||[]).find(p=>p.id===item.playlistId);
        return(<div key={item.id} style={{display:"flex",gap:"14px"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{width:"42px",height:"42px",borderRadius:"50%",background:"#1a1a1a",border:`2px solid ${pl?.color||"#FFD700"}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>{item.icon}</div>
            {i<(event.schedule||[]).length-1&&<div style={{width:"2px",height:"36px",background:"linear-gradient(#FFD70033,transparent)",margin:"4px 0"}}/>}
          </div>
          <div style={{paddingBottom:"12px",paddingTop:"6px"}}>
            <div style={{color:pl?.color||"#FFD700",fontSize:"12px",fontWeight:"700",letterSpacing:"1px"}}>{item.time}</div>
            <div style={{color:"#fff",fontSize:"15px",fontWeight:"600",margin:"1px 0"}}>{item.label}</div>
            <div style={{color:"#666",fontSize:"12px"}}>{item.detail}</div>
            {pl&&<div style={{marginTop:"4px",display:"inline-block",padding:"2px 8px",background:`${pl.color}22`,border:`1px solid ${pl.color}44`,borderRadius:"20px",color:pl.color,fontSize:"11px",fontWeight:"600"}}>{pl.name}</div>}
          </div>
        </div>);
      })}
    </div>
  );
}

// ─── PLAYLISTS ────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════
function PlaylistsPage({event,onSelect}){
  const pls=event.playlists||[];
  return(
    <div style={{padding:"20px"}}>
      <div style={{color:"#555",fontSize:"11px",fontWeight:"700",letterSpacing:"3px",marginBottom:"16px"}}>{pls.filter(p=>p.enabled).length} PLAYLISTS ACTIVAS</div>
      {pls.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#333",fontSize:"13px"}}>Sin playlists. Agregalas en Configuración → 🎶 Playlists.</div>}
      {pls.map(p=>(<button type="button" translate="no" key={p.id} onClick={()=>p.enabled&&onSelect(p.id)} style={{display:"flex",width:"100%",alignItems:"center",gap:"14px",padding:"14px",background:"#111",border:`1px solid ${p.enabled?p.color+"33":"#2a2a2a"}`,borderRadius:"12px",marginBottom:"8px",cursor:p.enabled?"pointer":"default",textAlign:"left",opacity:p.enabled?1:.4}}>
        <div style={{width:"42px",height:"42px",borderRadius:"10px",background:`${p.color}22`,border:`1px solid ${p.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>{p.name.split(" ")[0]}</div>
        <div style={{flex:1}}><div style={{color:"#fff",fontSize:"15px",fontWeight:"600"}}>{p.name}</div><div style={{color:"#666",fontSize:"12px"}}>{(p.songs||[]).filter(s=>s.enabled).length} temas · {p.enabled?"Activa":"Desactivada"}</div></div>
        {p.enabled&&<div style={{color:p.color,fontSize:"20px"}}>›</div>}
      </button>))}
    </div>
  );
}

function PlaylistDetailPage({playlist}){
  const [copied,setCopied]=useState(false);
  const active=(playlist.songs||[]).filter(s=>s.enabled);
  return(
    <div style={{padding:"20px"}}>
      <div style={{background:`linear-gradient(135deg,${playlist.color}11,#111)`,border:`1px solid ${playlist.color}33`,borderRadius:"14px",padding:"18px",marginBottom:"16px"}}>
        <div style={{color:playlist.color,fontSize:"11px",fontWeight:"700",letterSpacing:"3px",marginBottom:"4px"}}>{active.length} TEMAS ACTIVOS</div>
        <div style={{display:"flex",gap:"10px",marginTop:"10px"}}>
          <a href={playlist.spotifyUri?`https://open.spotify.com/${playlist.spotifyUri.replace("spotify:","").replace(/:/g,"/")}`:(`https://open.spotify.com/search/${encodeURIComponent(playlist.name)}`)} target="_blank" rel="noopener noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",padding:"11px",background:"#1DB954",borderRadius:"10px",textDecoration:"none",color:"#000",fontWeight:"800",fontSize:"13px"}}>▶ Abrir en Spotify</a>
          <button type="button" translate="no" onClick={()=>navigator.clipboard.writeText(active.map((s,i)=>`${i+1}. ${s.title} – ${s.artist}`).join("\n")).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);})} style={{padding:"11px 14px",background:copied?playlist.color:`${playlist.color}22`,border:`1.5px solid ${playlist.color}`,borderRadius:"10px",color:copied?"#000":playlist.color,fontWeight:"700",fontSize:"12px",cursor:"pointer"}}>{copied?"✓":"📋"}</button>
        </div>
      </div>
      {(playlist.songs||[]).map((song,i)=>(<div key={song.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"11px 14px",marginBottom:"5px",background:i%2===0?"#111":"#0d0d0d",borderRadius:"10px",borderLeft:`3px solid ${song.enabled?playlist.color:"#333"}`,opacity:song.enabled?1:.35}}>
        <div style={{width:"26px",height:"26px",borderRadius:"50%",background:`${playlist.color}22`,display:"flex",alignItems:"center",justifyContent:"center",color:playlist.color,fontSize:"10px",fontWeight:"800",flexShrink:0}}>{i+1}</div>
        <div style={{flex:1,minWidth:0}}><div style={{color:"#fff",fontSize:"14px",fontWeight:"600",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{song.title}</div><div style={{color:"#777",fontSize:"12px"}}>{song.artist}</div></div>
      </div>))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// ─── SETTINGS ─────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════
function SettingsPage({event,onChange,spotifyToken,onToken,onLogout}){
  const [tab,setTab]=useState("general");
  const tabs=[{id:"general",label:"⚙️ General"},{id:"spotify",label:`🎵 Spotify${spotifyToken?" ✅":""}`},{id:"schedule",label:"📅 Programa"},{id:"playlists",label:"🎶 Playlists"}];

  // General
  const SettGen=()=>{
    const upd=(k,v)=>onChange({...event,[k]:v});
    return(<div style={{padding:"20px"}}>
      <div style={{...S.card(),marginBottom:"16px"}}>
        <div style={{color:"#FFD700",fontWeight:"700",marginBottom:"14px"}}>📋 Datos del Evento</div>
        <label style={S.label}>Nombre del Evento</label>
        <DebouncedInput style={{...S.input,marginBottom:"12px"}} value={event.name} onChange={v=>upd("name",v)}/>
        <label style={S.label}>Fecha</label>
        <input translate="no" spellCheck={false} autoCorrect="off" type="date" style={{...S.input,marginBottom:"12px",colorScheme:"dark"}} value={event.eventDate||""} onChange={e=>upd("eventDate",e.target.value)}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
          <div><label style={S.label}>Hora Desde</label><input translate="no" spellCheck={false} autoCorrect="off" type="time" style={S.input} value={event.timeFrom} onChange={e=>upd("timeFrom",e.target.value)}/></div>
          <div><label style={S.label}>Hora Hasta</label><input translate="no" spellCheck={false} autoCorrect="off" type="time" style={S.input} value={event.timeTo} onChange={e=>upd("timeTo",e.target.value)}/></div>
        </div>
        <label style={S.label}>Lugar</label>
        <DebouncedInput style={S.input} value={event.location||""} onChange={v=>upd("location",v)} placeholder="Dirección, salón..."/>
      </div>
      <div style={{...S.card(),display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <div><div style={{color:"#fff",fontWeight:"700",marginBottom:"2px"}}>🔕 Bloquear Notificaciones</div><div style={{color:"#666",fontSize:"12px"}}>Silenciar durante el evento</div></div>
        <Toggle on={event.blockNotifications||false} onChange={v=>{upd("blockNotifications",v);if(v&&"Notification"in window)Notification.requestPermission();}}/>
      </div>
      <div style={{...S.card("#ffffff11")}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:event.watermark?.enabled?"14px":"0"}}>
          <div style={{color:"#fff",fontWeight:"700"}}>💧 Marca de Agua</div>
          <Toggle on={event.watermark?.enabled||false} onChange={v=>onChange({...event,watermark:{...event.watermark,enabled:v}})}/>
        </div>
        {event.watermark?.enabled&&<>
          <DebouncedInput style={{...S.input,marginBottom:"12px"}} value={event.watermark?.text||""} onChange={v=>onChange({...event,watermark:{...event.watermark,text:v}})} placeholder={event.name}/>
          <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
            {["suave","media","fuerte"].map(n=>(<button type="button" translate="no" key={n} onClick={()=>onChange({...event,watermark:{...event.watermark,intensity:n}})} style={{flex:1,padding:"8px",borderRadius:"8px",border:`1.5px solid ${event.watermark?.intensity===n?"#FFD700":"#333"}`,background:event.watermark?.intensity===n?"#FFD70022":"transparent",color:event.watermark?.intensity===n?"#FFD700":"#555",fontWeight:"700",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>{n}</button>))}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
            <div style={{color:"#888",fontSize:"12px"}}>Solo en pantalla principal</div>
            <Toggle on={event.watermark?.onlyHome||false} onChange={v=>onChange({...event,watermark:{...event.watermark,onlyHome:v}})}/>
          </div>
          <div style={{padding:"10px 14px",background:"#1a1a1a",borderRadius:"10px",display:"flex",justifyContent:"flex-end"}}><span style={{color:"#ffffff3a",fontSize:"12px",fontWeight:"500",whiteSpace:"nowrap"}}>{event.watermark?.text||event.name}</span></div>
        </>}
      </div>
    </div>);
  };

  // Spotify
  const SettSpotify=()=>{
    const [showUrl,setShowUrl]=useState(false);
    const redirectUri=window.location.href.split("#")[0].split("?")[0];
    return(<div style={{padding:"20px"}}>
      {spotifyToken?(<div style={{...S.card("#1DB95444"),marginBottom:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}><div style={{width:"12px",height:"12px",borderRadius:"50%",background:"#1DB954"}}/><div style={{color:"#1DB954",fontWeight:"800",fontSize:"15px"}}>✅ Spotify Conectado</div></div>
        <div style={{color:"#888",fontSize:"12px",marginBottom:"12px"}}>Cuenta Premium activa. Podés usar el Modo DJ.</div>
        <button type="button" translate="no" onClick={onLogout} style={{...S.btn("#ff4444"),width:"100%"}}>Desconectar</button>
      </div>):(<div style={{...S.card("#1DB95422"),marginBottom:"16px"}}>
        <div style={{color:"#1DB954",fontWeight:"800",fontSize:"15px",marginBottom:"12px"}}>🎵 Conectar Spotify Premium</div>
        <div style={{padding:"12px",background:"#0d1a0d",borderRadius:"10px",marginBottom:"12px"}}>
          <div style={{color:"#1DB954",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"6px"}}>PASO 1 · CREAR APP EN SPOTIFY</div>
          <div style={{color:"#888",fontSize:"12px",lineHeight:"1.6",marginBottom:"8px"}}>1. Entrá a <a href="https://developer.spotify.com/dashboard" target="_blank" rel="noopener noreferrer" style={{color:"#1DB954"}}>developer.spotify.com/dashboard</a><br/>2. "Create app" → completá nombre y Redirect URI<br/>3. Copiá el <strong style={{color:"#fff"}}>Client ID</strong></div>
          <button type="button" translate="no" onClick={()=>setShowUrl(!showUrl)} style={{...S.btn("#1DB954"),fontSize:"12px",padding:"7px 12px"}}>📋 {showUrl?"Ocultar":"Ver"} mi Redirect URI</button>
          {showUrl&&<div style={{marginTop:"8px",padding:"10px",background:"#111",borderRadius:"8px",border:"1px solid #1DB95433"}}><div style={{color:"#888",fontSize:"11px",marginBottom:"4px"}}>Copiá esta URL exacta en Spotify Developer:</div><div style={{color:"#1DB954",fontSize:"11px",wordBreak:"break-all",fontFamily:"monospace"}}>{redirectUri}</div><button type="button" translate="no" onClick={()=>navigator.clipboard.writeText(redirectUri)} style={{...S.btn("#1DB954"),fontSize:"11px",padding:"5px 10px",marginTop:"8px"}}>Copiar</button></div>}
        </div>
        <div style={{padding:"12px",background:"#0d1a0d",borderRadius:"10px",marginBottom:"12px"}}>
          <div style={{color:"#1DB954",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"6px"}}>PASO 2 · CLIENT ID</div>
          <DebouncedInput style={{...S.input,borderColor:"#1DB95444"}} value={event.spotifyClientId||""} onChange={v=>onChange({...event,spotifyClientId:v})} placeholder="Ej: a1b2c3d4e5f6..."/>
        </div>
        <button type="button" translate="no" onClick={()=>event.spotifyClientId&&startSpotifyAuth(event.spotifyClientId)} style={{display:"block",width:"100%",textAlign:"center",padding:"14px",background:event.spotifyClientId?"#1DB954":"#333",border:"none",borderRadius:"10px",color:event.spotifyClientId?"#000":"#666",fontWeight:"800",fontSize:"15px",cursor:event.spotifyClientId?"pointer":"not-allowed",fontFamily:"inherit"}}>
          {event.spotifyClientId?"▶ Conectar con Spotify":"Ingresá tu Client ID primero"}
        </button>
      </div>)}
    </div>);
  };

  // Schedule
  const SettSchedule=()=>{
    const items=event.schedule||[];
    const move=(i,dir)=>{const a=[...items];const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];onChange({...event,schedule:a});};
    const remove=(id)=>onChange({...event,schedule:items.filter(s=>s.id!==id)});
    const add=()=>onChange({...event,schedule:[...items,{id:uid(),time:"00:00",icon:"⭐",label:"Nueva actividad",detail:"",playlistId:null}]});
    const upd=(id,k,v)=>onChange({...event,schedule:items.map(s=>s.id===id?{...s,[k]:v}:s)});
    return(<div style={{padding:"20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <div style={{color:"#888",fontSize:"11px",fontWeight:"700",letterSpacing:"2px"}}>CRONOGRAMA ({items.length})</div>
        <button type="button" translate="no" onClick={add} style={S.btnFill("#FFD700")}>+ Agregar</button>
      </div>
      {items.map((item,i)=>(<div key={item.id} style={{...S.card("#FFD70022"),padding:"12px"}}>
        <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
          <DebouncedInput style={{...S.input,width:"52px",padding:"8px 4px",textAlign:"center",fontSize:"18px",flexShrink:0}} value={item.icon} onChange={v=>upd(item.id,"icon",v)} maxLength={2}/>
          <input translate="no" spellCheck={false} autoCorrect="off" type="time" style={{...S.input,width:"95px",flexShrink:0}} value={item.time} onChange={e=>upd(item.id,"time",e.target.value)}/>
          <div style={{display:"flex",gap:"4px",marginLeft:"auto"}}>
            <button type="button" translate="no" onClick={()=>move(i,-1)} disabled={i===0} style={{...S.btn("#FFD700"),padding:"6px 9px",opacity:i===0?.3:1}}>▲</button>
            <button type="button" translate="no" onClick={()=>move(i,1)} disabled={i===items.length-1} style={{...S.btn("#FFD700"),padding:"6px 9px",opacity:i===items.length-1?.3:1}}>▼</button>
            <button type="button" translate="no" onClick={()=>remove(item.id)} style={{...S.btn("#ff4444"),padding:"6px 9px"}}>✕</button>
          </div>
        </div>
        <DebouncedInput style={{...S.input,marginBottom:"6px"}} value={item.label} onChange={v=>upd(item.id,"label",v)} placeholder="Actividad"/>
        <DebouncedInput style={{...S.input,marginBottom:"6px"}} value={item.detail} onChange={v=>upd(item.id,"detail",v)} placeholder="Descripción"/>
        <label style={S.label}>Playlist</label>
        <select translate="no" style={S.input} value={item.playlistId||""} onChange={e=>upd(item.id,"playlistId",e.target.value||null)}>
          <option value="">— Sin playlist —</option>
          {(event.playlists||[]).filter(p=>p.enabled).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>))}
    </div>);
  };

  // Playlists
  const SettPlaylists=()=>{
    const [expanded,setExpanded]=useState(null);
    const [newSong,setNewSong]=useState({});
    const pls=event.playlists||[];
    const movePl=(i,dir)=>{const a=[...pls];const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];onChange({...event,playlists:a});};
    const updPl=(id,k,v)=>onChange({...event,playlists:pls.map(p=>p.id===id?{...p,[k]:v}:p)});
    const removePl=(id)=>onChange({...event,playlists:pls.filter(p=>p.id!==id)});
    const addPl=()=>{const color=PCOLORS[pls.length%PCOLORS.length];onChange({...event,playlists:[...pls,{id:uid(),name:"🎵 Nueva Playlist",enabled:true,color,spotifyUri:"",songs:[]}]});};
    const moveSong=(plId,i,dir)=>{const pl=pls.find(p=>p.id===plId);const a=[...pl.songs];const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];onChange({...event,playlists:pls.map(p=>p.id===plId?{...p,songs:a}:p)});};
    const updSong=(plId,sId,k,v)=>onChange({...event,playlists:pls.map(p=>p.id===plId?{...p,songs:p.songs.map(s=>s.id===sId?{...s,[k]:v}:s)}:p)});
    const removeSong=(plId,sId)=>onChange({...event,playlists:pls.map(p=>p.id===plId?{...p,songs:p.songs.filter(s=>s.id!==sId)}:p)});
    const addSong=(plId)=>{const ns=newSong[plId]||{};if(!ns.title)return;onChange({...event,playlists:pls.map(p=>p.id===plId?{...p,songs:[...p.songs,{id:uid(),title:ns.title,artist:ns.artist||"",enabled:true}]}:p)});setNewSong(prev=>({...prev,[plId]:{title:"",artist:""}}));};
    return(<div style={{padding:"20px"}}>
      <div style={{...S.card("#1DB95433"),padding:"14px 16px",marginBottom:"16px"}}>
        <div style={{color:"#1DB954",fontWeight:"800",fontSize:"14px",marginBottom:"4px"}}>🎵 Playlists de este evento</div>
        <div style={{color:"#666",fontSize:"12px",marginBottom:"12px"}}>▲▼ reordenar · ▼ expandir para ver canciones</div>
        <button type="button" translate="no" onClick={addPl} style={{...S.btnFill("#1DB954"),width:"100%",padding:"12px"}}>+ Crear nueva playlist</button>
      </div>
      {pls.map((pl,pi)=>(<div key={pl.id} style={{border:`1.5px solid ${pl.enabled?pl.color+"44":"#2a2a2a"}`,borderRadius:"14px",marginBottom:"10px",overflow:"hidden",background:"#111"}}>
        <div style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:"8px"}}>
          <Toggle on={pl.enabled} onChange={v=>updPl(pl.id,"enabled",v)}/>
          <DebouncedInput style={{...S.input,flex:1,padding:"7px 10px",fontSize:"13px",fontWeight:"700",border:`1.5px solid ${pl.color}44`}} value={pl.name} onChange={v=>updPl(pl.id,"name",v)}/>
          <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
            <button type="button" translate="no" onClick={()=>movePl(pi,-1)} disabled={pi===0} style={{background:"none",border:`1px solid ${pi===0?"#333":pl.color}`,borderRadius:"5px",color:pi===0?"#333":pl.color,width:"24px",height:"22px",cursor:pi===0?"default":"pointer",fontSize:"10px"}}>▲</button>
            <button type="button" translate="no" onClick={()=>movePl(pi,1)} disabled={pi===pls.length-1} style={{background:"none",border:`1px solid ${pi===pls.length-1?"#333":pl.color}`,borderRadius:"5px",color:pi===pls.length-1?"#333":pl.color,width:"24px",height:"22px",cursor:pi===pls.length-1?"default":"pointer",fontSize:"10px"}}>▼</button>
          </div>
          <button type="button" translate="no" onClick={()=>setExpanded(expanded===pl.id?null:pl.id)} style={{...S.btn(pl.color),padding:"6px 10px",fontSize:"12px",minWidth:"70px"}}>{expanded===pl.id?"▲ Cerrar":`▼ ${pl.songs.length}`}</button>
          <button type="button" translate="no" onClick={()=>removePl(pl.id)} style={{background:"none",border:"1px solid #ff444466",borderRadius:"8px",color:"#ff4444",cursor:"pointer",padding:"6px 9px",fontSize:"14px"}}>✕</button>
        </div>
        {expanded===pl.id&&(<div style={{borderTop:`1px solid ${pl.color}22`,padding:"12px 14px",background:"#0d0d0d"}}>
          <label style={S.label}>Spotify URI</label>
          <DebouncedInput style={{...S.input,fontSize:"12px",fontFamily:"monospace",marginBottom:"12px"}} value={pl.spotifyUri||""} onChange={v=>updPl(pl.id,"spotifyUri",v)} placeholder="spotify:playlist:xxxxx"/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{color:pl.color,fontSize:"11px",fontWeight:"700",letterSpacing:"2px"}}>{pl.songs.filter(s=>s.enabled).length}/{pl.songs.length} ACTIVAS</div>
            <div style={{color:"#555",fontSize:"11px"}}>▲▼ mover · ✕ quitar</div>
          </div>
          {pl.songs.length===0&&<div style={{color:"#444",fontSize:"13px",textAlign:"center",padding:"12px 0"}}>Sin canciones 👇</div>}
          {pl.songs.map((song,si)=>(<div key={song.id} style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"5px",padding:"7px 10px",background:"#111",borderRadius:"8px",borderLeft:`3px solid ${song.enabled?pl.color:"#333"}`}}>
            <Toggle on={song.enabled} onChange={v=>updSong(pl.id,song.id,"enabled",v)}/>
            <div style={{flex:1,minWidth:0}}><div style={{color:song.enabled?"#fff":"#555",fontSize:"13px",fontWeight:"600",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{si+1}. {song.title}</div><div style={{color:"#555",fontSize:"11px"}}>{song.artist}</div></div>
            <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
              <button type="button" translate="no" onClick={()=>moveSong(pl.id,si,-1)} disabled={si===0} style={{background:"none",border:`1px solid ${si===0?"#2a2a2a":pl.color+"88"}`,borderRadius:"4px",color:si===0?"#2a2a2a":pl.color,width:"22px",height:"18px",cursor:si===0?"default":"pointer",fontSize:"9px"}}>▲</button>
              <button type="button" translate="no" onClick={()=>moveSong(pl.id,si,1)} disabled={si===pl.songs.length-1} style={{background:"none",border:`1px solid ${si===pl.songs.length-1?"#2a2a2a":pl.color+"88"}`,borderRadius:"4px",color:si===pl.songs.length-1?"#2a2a2a":pl.color,width:"22px",height:"18px",cursor:si===pl.songs.length-1?"default":"pointer",fontSize:"9px"}}>▼</button>
            </div>
            <button type="button" translate="no" onClick={()=>removeSong(pl.id,song.id)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:"16px",padding:"0 2px"}}>✕</button>
          </div>))}
          <div style={{marginTop:"12px",padding:"12px",background:"#111",borderRadius:"10px",border:`1.5px dashed ${pl.color}55`}}>
            <div style={{color:pl.color,fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"8px"}}>➕ AGREGAR</div>
            <input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,marginBottom:"6px"}} placeholder="Título *" value={(newSong[pl.id]||{}).title||""} onChange={e=>setNewSong(prev=>({...prev,[pl.id]:{...(prev[pl.id]||{}),title:e.target.value}}))} onKeyDown={e=>e.key==="Enter"&&addSong(pl.id)}/>
            <input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,marginBottom:"10px"}} placeholder="Artista" value={(newSong[pl.id]||{}).artist||""} onChange={e=>setNewSong(prev=>({...prev,[pl.id]:{...(prev[pl.id]||{}),artist:e.target.value}}))} onKeyDown={e=>e.key==="Enter"&&addSong(pl.id)}/>
            <button type="button" translate="no" onClick={()=>addSong(pl.id)} style={{...S.btnFill(pl.color),width:"100%",padding:"11px"}}>Agregar al final</button>
          </div>
        </div>)}
      </div>))}
    </div>);
  };

  return(<div>
    <div style={{display:"flex",gap:"4px",padding:"12px 16px 0",overflowX:"auto",borderBottom:"1px solid #1a1a1a"}}>
      {tabs.map(t=>(<button type="button" translate="no" key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 12px",borderRadius:"8px 8px 0 0",border:"none",background:tab===t.id?"#1a1a1a":"transparent",color:tab===t.id?"#FFD700":"#555",fontWeight:"700",fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{t.label}</button>))}
    </div>
    {tab==="general"   &&<SettGen/>}
    {tab==="spotify"   &&<SettSpotify/>}
    {tab==="schedule"  &&<SettSchedule/>}
    {tab==="playlists" &&<SettPlaylists/>}
  </div>);
}

// ─── INSTALL PAGE ─────────────────────────────────────────────────
