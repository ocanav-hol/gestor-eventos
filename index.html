  const [platform,setPlatform]=useState(detectPlatform());
  const steps={
    android:[{icon:"🌐",title:"Abrir en Chrome",desc:"Abrí esta página en Google Chrome"},{icon:"⋮",title:"Menú ⋮",desc:"Tocá los 3 puntitos arriba a la derecha"},{icon:"📲",title:"Agregar a pantalla de inicio",desc:'Seleccioná "Agregar a pantalla de inicio"'},{icon:"✅",title:"Confirmar",desc:'Tocá "Agregar" – aparece el ícono en tu pantalla'}],
    ios:[{icon:"🌐",title:"Abrir en Safari",desc:"Obligatorio: usá Safari, no Chrome"},{icon:"⬆️",title:"Botón Compartir",desc:"Tocá ⬆️ en la barra inferior"},{icon:"➕",title:"Agregar a Inicio",desc:'Seleccioná "Agregar a pantalla de inicio"'},{icon:"✅",title:"Confirmar",desc:'Tocá "Agregar"'}],
    windows:[{icon:"🌐",title:"Edge o Chrome",desc:"Abrí esta página en Edge o Chrome"},{icon:"💻",title:"Ícono ➕",desc:"En la barra de dirección hacé click en ➕"},{icon:"📦",title:"Instalar",desc:'Click en "Instalar"'},{icon:"✅",title:"Listo",desc:"Aparece en el Menú Inicio"}],
    mac:[{icon:"🌐",title:"Chrome o Edge",desc:"Abrí en Chrome o Edge"},{icon:"💻",title:"Ícono ➕",desc:"Hacé click en el ➕ de la barra de dirección"},{icon:"✅",title:"Listo",desc:"Aparece en Dock y Launchpad"}],
  };
  const platforms=[{id:"android",label:"🤖 Android"},{id:"ios",label:"🍎 iPhone"},{id:"windows",label:"🪟 Windows"},{id:"mac",label:"🍏 Mac"}];
  return(<div style={{padding:"20px"}}>
    <div style={{textAlign:"center",marginBottom:"20px"}}><div style={{fontSize:"48px",marginBottom:"8px"}}>📲</div><div style={{color:"#FFD700",fontSize:"18px",fontWeight:"800"}}>Instalar la App</div></div>
    <div style={{display:"flex",gap:"8px",marginBottom:"18px",flexWrap:"wrap"}}>
      {platforms.map(p=>(<button type="button" translate="no" key={p.id} onClick={()=>setPlatform(p.id)} style={{...S.btn(platform===p.id?"#FFD700":"#444",platform===p.id?"#FFD70022":"transparent"),flex:1,minWidth:"80px",fontSize:"12px",padding:"8px 10px"}}>{p.label}</button>))}
    </div>
    {(steps[platform]||steps.android).map((step,i)=>(<div key={i} style={{display:"flex",gap:"14px",...S.card("#FFD70022"),alignItems:"flex-start"}}>
      <div style={{width:"36px",height:"36px",borderRadius:"10px",background:"#FFD70022",border:"1px solid #FFD70044",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>{step.icon}</div>
      <div><div style={{color:"#FFD700",fontWeight:"700",fontSize:"13px",marginBottom:"2px"}}>{i+1}. {step.title}</div><div style={{color:"#888",fontSize:"13px",lineHeight:"1.5"}}>{step.desc}</div></div>
    </div>))}
  </div>);
}

// ══════════════════════════════════════════════════════════════════
// ─── GUESTS PAGE ──────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════
function GuestsPage({event,onChange}){
  const [tab,setTab]=useState("list");
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({firstName:"",lastName:"",nickname:"",whatsapp:"",email:"",gender:"female",ageGroup:"adult",companions:0,notes:""});

  const guests=event.guestList||[];
  const logistics=event.logistics||{};
  const inv=event.invitation||{};

  const confirmed=guests.filter(g=>g.confirmed===true);
  const declined=guests.filter(g=>g.confirmed===false);
  const pending=guests.filter(g=>g.confirmed===null||g.confirmed===undefined);
  const totalAttending=confirmed.reduce((s,g)=>s+1+(parseInt(g.companions)||0),0);

  const updGuests=(list)=>onChange({...event,guestList:list});
  const updLogistics=(l)=>onChange({...event,logistics:{...(event.logistics||{}), ...l}});
  const updInv=(i)=>onChange({...event,invitation:{...(event.invitation||{}), ...i}});

  // How to display guest name based on invitation config
  const displayName=(g)=>{
    const nameFormat=inv.nameFormat||"firstName";
    if(nameFormat==="nickname") return g.nickname||g.firstName||g.lastName||"Invitado";
    if(nameFormat==="full") return [g.firstName,g.lastName].filter(Boolean).join(" ")||g.nickname||"Invitado";
    if(nameFormat==="lastName") return g.lastName||g.firstName||g.nickname||"Invitado";
    return g.firstName||g.nickname||g.lastName||"Invitado"; // default: firstName
  };

  const saveGuest=()=>{
    if(!form.firstName.trim()&&!form.nickname.trim()) return;
    if(editing){
      updGuests(guests.map(g=>g.id===editing?{...g,...form}:g));
    } else {
      updGuests([...guests,{id:uid(),...form,confirmed:null,paidAmount:0,paidDate:"",paidMethod:""}]);
    }
    setForm({firstName:"",lastName:"",nickname:"",whatsapp:"",email:"",gender:"female",ageGroup:"adult",companions:0,notes:""});
    setEditing(null);
  };

  const deleteGuest=(id)=>updGuests(guests.filter(g=>g.id!==id));
  const setConfirmed=(id,val)=>updGuests(guests.map(g=>g.id===id?{...g,confirmed:val}:g));

  // Build invitation text with RSVP form link
  const buildInvText=(guest)=>{
    const d=event.eventDate?fmtDate(event.eventDate):"";
    const name=displayName(guest);
    const rsvpFormUrl=buildRsvpLink(event, name);
    const lines=[
      inv.title||event.name,
      "",
      `Hola ${name}! 🎉`,
      inv.message||`Tenemos el agrado de invitarte a ${event.name}.`,
      "",
      inv.showDate!==false&&d?`📅 Fecha: ${d}`:"",
      inv.showLocation!==false&&event.location?`📍 Lugar: ${event.location}`:"",
      inv.showTime!==false&&event.timeFrom?`🕘 Horario: ${event.timeFrom} hs`:"",
      inv.dress?`👗 Vestimenta: ${inv.dress}`:"",
      "",
      logistics.serviceType?`🍽 ${({bandejeado:"Servicio bandejeado",mesa_servida:"Mesa servida",buffet:"Buffet",picada:"Picada",otro:"Comida y bebida"}[logistics.serviceType]||logistics.serviceType)}`:"",
      logistics.alasBolsa?.enabled?`🛍 A la bolsa: ${[logistics.alasBolsa.bebida&&"bebida",logistics.alasBolsa.comida&&"comida"].filter(Boolean).join(" y ")}`:"",
      logistics.utensils?.needed?`🍴 Traer: ${logistics.utensils.items?.join(", ")||"utensilios"}`:"",
      "",
      inv.rsvpDeadline?`📩 Confirmá antes del ${fmtDate(inv.rsvpDeadline)}.`:"",
      "",
      `✅❌ Confirmá tu asistencia aquí:`,
      rsvpFormUrl,
    ].filter(v=>v!==undefined&&v!==null&&v!=="");
    return lines.join("\n");
  };

  const sendInvitation=(guest)=>{
    const text=buildInvText(guest);
    const channel=inv.sendChannel||"whatsapp";
    if(channel==="whatsapp"&&guest.whatsapp) window.open(`https://wa.me/${guest.whatsapp.replace(/\D/g,"")}?text=${encodeURIComponent(text)}`,"_blank");
    else if(channel==="email"&&guest.email) window.open(`mailto:${guest.email}?subject=${encodeURIComponent(inv.title||event.name)}&body=${encodeURIComponent(text)}`);
    else if(guest.whatsapp) window.open(`https://wa.me/${guest.whatsapp.replace(/\D/g,"")}?text=${encodeURIComponent(text)}`,"_blank");
    else if(guest.email) window.open(`mailto:${guest.email}?subject=${encodeURIComponent(inv.title||event.name)}&body=${encodeURIComponent(text)}`);
  };

  const AGE_GROUPS=[{id:"child",label:"Menor (<12)"},{id:"teen",label:"Adolescente (12-17)"},{id:"adult",label:"Adulto (18-64)"},{id:"senior",label:"Adulto mayor (65+)"}];
  const GENDERS=[{id:"female",label:"Femenino"},{id:"male",label:"Masculino"},{id:"other",label:"Otro"}];
  const ageCounts=AGE_GROUPS.map(a=>({...a,count:guests.filter(g=>g.ageGroup===a.id).length}));
  const genderCounts=GENDERS.map(g=>({...g,count:guests.filter(gg=>gg.gender===g.id).length}));

  return(
    <div style={{padding:"0 0 40px"}}>
      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid #1a1a1a",overflowX:"auto"}}>
        {[["list","👥 Lista"],["stats","📊 Stats"],["logistics","🍽 Logística"],["invitation","✉️ Invitación"]].map(([id,label])=>(
          <button type="button" translate="no" key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"12px 8px",border:"none",borderBottom:`2px solid ${tab===id?"#FF6B9D":"transparent"}`,background:"transparent",color:tab===id?"#FF6B9D":"#555",fontWeight:"700",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{label}</button>
        ))}
      </div>

      {/* ── LIST TAB ── */}
      {tab==="list"&&(
        <div style={{padding:"16px"}}>
          {/* Summary bar */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"6px",marginBottom:"16px"}}>
            {[{label:"Total",value:guests.length,color:"#FF6B9D"},{label:"Confirmados",value:confirmed.length,color:"#1DB954"},{label:"Rechazaron",value:declined.length,color:"#ff4444"},{label:"Pendientes",value:pending.length,color:"#FFD700"}].map((s,i)=>(
              <div key={i} style={{padding:"8px 6px",background:"#111",border:`1px solid ${s.color}33`,borderRadius:"10px",textAlign:"center"}}>
                <div style={{color:s.color,fontWeight:"900",fontSize:"16px"}}>{s.value}</div>
                <div style={{color:"#555",fontSize:"9px",marginTop:"2px"}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Add/Edit form */}
          <div style={{...S.card("#FF6B9D33"),marginBottom:"16px"}}>
            <div style={{color:"#FF6B9D",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"10px"}}>{editing?"✏️ EDITAR":"➕ AGREGAR INVITADO"}</div>
            {/* Name fields */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
              <input translate="no" spellCheck={false} autoCorrect="off" style={S.input} placeholder="Nombre *" value={form.firstName} onChange={e=>setForm(f=>({...f,firstName:e.target.value}))}/>
              <input translate="no" spellCheck={false} autoCorrect="off" style={S.input} placeholder="Apellido" value={form.lastName||""} onChange={e=>setForm(f=>({...f,lastName:e.target.value}))}/>
            </div>
            <input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,marginBottom:"8px"}} placeholder="Apodo (opcional)" value={form.nickname||""} onChange={e=>setForm(f=>({...f,nickname:e.target.value}))}/>
            {/* Contact */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
              <input translate="no" spellCheck={false} autoCorrect="off" style={S.input} placeholder="WhatsApp" value={form.whatsapp||""} type="tel" onChange={e=>setForm(f=>({...f,whatsapp:e.target.value}))}/>
              <input translate="no" spellCheck={false} autoCorrect="off" style={S.input} placeholder="Email" value={form.email||""} type="email" onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
            </div>
            {/* Demographics */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"10px"}}>
              <select translate="no" style={{...S.input,padding:"8px 10px",fontSize:"12px"}} value={form.gender} onChange={e=>setForm(f=>({...f,gender:e.target.value}))}>
                {GENDERS.map(g=><option key={g.id} value={g.id}>{g.label}</option>)}
              </select>
              <select translate="no" style={{...S.input,padding:"8px 10px",fontSize:"12px"}} value={form.ageGroup} onChange={e=>setForm(f=>({...f,ageGroup:e.target.value}))}>
                {AGE_GROUPS.map(a=><option key={a.id} value={a.id}>{a.label}</option>)}
              </select>
              <div>
                <div style={{color:"#555",fontSize:"10px",marginBottom:"4px"}}>+Acomp.</div>
                <input translate="no" spellCheck={false} autoCorrect="off" style={{...S.input,padding:"8px 10px",fontSize:"12px"}} type="number" min="0" value={form.companions} onChange={e=>setForm(f=>({...f,companions:parseInt(e.target.value)||0}))}/>
              </div>
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              <button type="button" translate="no" onClick={saveGuest} style={{...S.btnFill("#FF6B9D"),flex:1}}>{editing?"Guardar":"Agregar"}</button>
              {editing&&<button type="button" translate="no" onClick={()=>{setEditing(null);setForm({firstName:"",lastName:"",nickname:"",whatsapp:"",email:"",gender:"female",ageGroup:"adult",companions:0,notes:""});}} style={{...S.btn("#888"),flex:1}}>Cancelar</button>}
            </div>
          </div>

          {/* Guest list */}
          {guests.length===0&&<div style={{textAlign:"center",padding:"24px",color:"#333",fontSize:"13px"}}>Sin invitados. Agregá el primero arriba 👆</div>}
          {guests.map(g=>{
            const dname=displayName(g);
            return(
            <div key={g.id} style={{padding:"12px 14px",marginBottom:"6px",background:"#111",borderRadius:"12px",border:`1px solid ${g.confirmed===true?"#1DB95433":g.confirmed===false?"#ff444433":"#FFD70022"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <div style={{width:"34px",height:"34px",borderRadius:"50%",background:g.confirmed===true?"#1DB95433":g.confirmed===false?"#ff444433":"#FFD70033",display:"flex",alignItems:"center",justifyContent:"center",color:g.confirmed===true?"#1DB954":g.confirmed===false?"#ff4444":"#FFD700",fontWeight:"900",fontSize:"14px",flexShrink:0}}>
                  {(g.firstName||g.nickname||"?").charAt(0).toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#fff",fontWeight:"700",fontSize:"14px"}}>
                    {[g.firstName,g.lastName].filter(Boolean).join(" ")||g.nickname}
                    {g.nickname&&g.firstName&&<span style={{color:"#666",fontWeight:"400",fontSize:"12px"}}> ({g.nickname})</span>}
                    {g.companions>0&&<span style={{color:"#666",fontWeight:"400",fontSize:"12px"}}> +{g.companions}</span>}
                  </div>
                  <div style={{color:"#555",fontSize:"11px"}}>{({child:"Menor",teen:"Adolescente",adult:"Adulto",senior:"Adulto mayor"}[g.ageGroup]||g.ageGroup)} · {({female:"Fem",male:"Masc",other:"Otro"}[g.gender]||g.gender)}</div>
                </div>
                <button type="button" translate="no" onClick={()=>setConfirmed(g.id,g.confirmed===true?null:true)} style={{width:"28px",height:"28px",borderRadius:"50%",border:`2px solid ${g.confirmed===true?"#1DB954":"#333"}`,background:g.confirmed===true?"#1DB954":"transparent",color:g.confirmed===true?"#000":"#555",fontSize:"13px",cursor:"pointer",flexShrink:0}}>✓</button>
                <button type="button" translate="no" onClick={()=>setConfirmed(g.id,g.confirmed===false?null:false)} style={{width:"28px",height:"28px",borderRadius:"50%",border:`2px solid ${g.confirmed===false?"#ff4444":"#333"}`,background:g.confirmed===false?"#ff4444":"transparent",color:g.confirmed===false?"#fff":"#555",fontSize:"13px",cursor:"pointer",flexShrink:0}}>✗</button>
              </div>
              <div style={{display:"flex",gap:"6px",marginTop:"8px",flexWrap:"wrap"}}>
                {(g.whatsapp||g.email)&&<button type="button" translate="no" onClick={()=>sendInvitation(g)} style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid #25D36644",background:"#25D36611",color:"#25D366",fontSize:"11px",fontWeight:"700",cursor:"pointer"}}>📨 Invitar</button>}
                {g.whatsapp&&<a href={`https://wa.me/${g.whatsapp.replace(/\D/g,"")}`} target="_blank" rel="noopener noreferrer" style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid #25D36633",background:"#25D36611",color:"#25D366",fontSize:"11px",fontWeight:"700",textDecoration:"none"}}>💬</a>}
                {g.email&&<a href={`mailto:${g.email}`} style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid #74C2E133",background:"#74C2E111",color:"#74C2E1",fontSize:"11px",fontWeight:"700",textDecoration:"none"}}>✉️</a>}
                <button type="button" translate="no" onClick={()=>{setEditing(g.id);setForm({firstName:g.firstName||"",lastName:g.lastName||"",nickname:g.nickname||"",whatsapp:g.whatsapp||"",email:g.email||"",gender:g.gender||"female",ageGroup:g.ageGroup||"adult",companions:g.companions||0,notes:g.notes||""});}} style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid #44444444",color:"#666",fontSize:"11px",cursor:"pointer",background:"transparent"}}>✏️</button>
                <button type="button" translate="no" onClick={()=>deleteGuest(g.id)} style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid #ff444433",color:"#ff4444",fontSize:"11px",cursor:"pointer",background:"transparent"}}>🗑</button>
              </div>
            </div>
          );})}
        </div>
      )}

      {/* ── STATS TAB ── */}
      {tab==="stats"&&(
        <div style={{padding:"16px"}}>
          <div style={{...S.card("#FF6B9D22"),marginBottom:"14px"}}>
            <div style={{color:"#FF6B9D",fontWeight:"700",marginBottom:"14px"}}>📊 Asistencia</div>
            {[{label:"Total invitados",value:guests.length,color:"#FF6B9D"},{label:"Confirmados (+ acomp.)",value:totalAttending,color:"#1DB954"},{label:"Declinaron",value:declined.length,color:"#ff4444"},{label:"Sin respuesta",value:pending.length,color:"#FFD700"}].map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #1a1a1a"}}>
                <div style={{color:"#888",fontSize:"13px"}}>{s.label}</div>
                <div style={{color:s.color,fontWeight:"900",fontSize:"18px"}}>{s.value}</div>
              </div>
            ))}
          </div>
          <div style={{...S.card("#74C2E122"),marginBottom:"14px"}}>
            <div style={{color:"#74C2E1",fontWeight:"700",marginBottom:"12px"}}>👥 Por edad</div>
            {ageCounts.map(a=>(
              <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                <div style={{color:"#888",fontSize:"13px"}}>{a.label}</div>
                <div style={{color:"#74C2E1",fontWeight:"700",fontSize:"14px"}}>{a.count}</div>
              </div>
            ))}
          </div>
          <div style={{...S.card("#C39BD322")}}>
            <div style={{color:"#C39BD3",fontWeight:"700",marginBottom:"12px"}}>⚤ Por género</div>
            {genderCounts.map(g=>(
              <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                <div style={{color:"#888",fontSize:"13px"}}>{g.label}</div>
                <div style={{color:"#C39BD3",fontWeight:"700",fontSize:"14px"}}>{g.count}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── LOGISTICS TAB ── */}
      {tab==="logistics"&&(
        <div style={{padding:"16px"}}>
          <div style={{...S.card()}}>
            <div style={{color:"#E87040",fontWeight:"700",marginBottom:"14px"}}>🍽 Tipo de servicio</div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"14px"}}>
              {[["bandejeado","🥂 Bandejeado"],["mesa_servida","🍽 Mesa servida"],["buffet","🍴 Buffet libre"],["picada","🧀 Picada / finger food"],["otro","✏️ Otro"]].map(([id,label])=>(
                <button type="button" translate="no" key={id} onClick={()=>updLogistics({serviceType:id})} style={{padding:"12px 14px",borderRadius:"10px",border:`1.5px solid ${logistics.serviceType===id?"#E87040":"#2a2a2a"}`,background:logistics.serviceType===id?"#E8704022":"transparent",color:logistics.serviceType===id?"#E87040":"#666",fontWeight:"700",fontSize:"13px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>{label}</button>
              ))}
            </div>
            <label style={S.label}>Brindis / nota especial</label>
            <DebouncedInput style={S.input} value={logistics.brindis||""} onChange={v=>updLogistics({brindis:v})} placeholder="Ej: Brindis con champagne a las 00:30"/>
          </div>
          <div style={{...S.card()}}>
            <div style={{color:"#FFD700",fontWeight:"700",marginBottom:"14px"}}>💳 Pago</div>
            <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
              {[["free","Gratis"],["full","Pago total"],["partial","Pago parcial"]].map(([id,label])=>(
                <button type="button" translate="no" key={id} onClick={()=>updLogistics({payment:{...(logistics.payment||{}),type:id}})} style={{flex:1,padding:"9px 8px",borderRadius:"8px",border:`1.5px solid ${logistics.payment?.type===id?"#FFD700":"#333"}`,background:logistics.payment?.type===id?"#FFD70022":"transparent",color:logistics.payment?.type===id?"#FFD700":"#555",fontWeight:"700",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>{label}</button>
              ))}
            </div>
            {logistics.payment?.type!=="free"&&(
              <>
                <label style={S.label}>Importe por persona</label>
                <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}><span style={{color:"#555"}}>$</span><input translate="no" spellCheck={false} autoCorrect="off" style={S.input} type="number" value={logistics.payment?.amount||""} onChange={e=>updLogistics({payment:{...(logistics.payment||{}),amount:parseFloat(e.target.value)||0}})} placeholder="0"/></div>
                <label style={S.label}>Medios aceptados</label>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                  {["Efectivo","Tarjeta","Transferencia","Débito"].map(m=>{const methods=logistics.payment?.methods||[];const active=methods.includes(m);return <button type="button" translate="no" key={m} onClick={()=>updLogistics({payment:{...(logistics.payment||{}),methods:active?methods.filter(x=>x!==m):[...methods,m]}})} style={{padding:"7px 12px",borderRadius:"8px",border:`1px solid ${active?"#FFD700":"#333"}`,background:active?"#FFD70022":"transparent",color:active?"#FFD700":"#555",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>{m}</button>;})}
                </div>
              </>
            )}
          </div>
          <div style={{...S.card()}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:logistics.alasBolsa?.enabled?"14px":"0"}}>
              <div style={{color:"#A8FF78",fontWeight:"700"}}>🛍 A la bolsa</div>
              <Toggle on={logistics.alasBolsa?.enabled||false} onChange={v=>updLogistics({alasBolsa:{...(logistics.alasBolsa||{}),enabled:v}})}/>
            </div>
            {logistics.alasBolsa?.enabled&&(<>
              <div style={{display:"flex",gap:"10px",marginBottom:"10px"}}>
                <label style={{display:"flex",alignItems:"center",gap:"6px",color:"#888",fontSize:"13px",cursor:"pointer"}}><input type="checkbox" checked={logistics.alasBolsa?.bebida||false} onChange={e=>updLogistics({alasBolsa:{...(logistics.alasBolsa||{}),bebida:e.target.checked}})} style={{accentColor:"#A8FF78"}}/>🍺 Bebida</label>
                <label style={{display:"flex",alignItems:"center",gap:"6px",color:"#888",fontSize:"13px",cursor:"pointer"}}><input type="checkbox" checked={logistics.alasBolsa?.comida||false} onChange={e=>updLogistics({alasBolsa:{...(logistics.alasBolsa||{}),comida:e.target.checked}})} style={{accentColor:"#A8FF78"}}/>🍕 Comida</label>
              </div>
              <DebouncedInput style={S.input} value={logistics.alasBolsa?.notes||""} onChange={v=>updLogistics({alasBolsa:{...(logistics.alasBolsa||{}),notes:v}})} placeholder="Aclaración (ej: bebida sin alcohol)"/>
            </>)}
          </div>
          <div style={{...S.card()}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:logistics.utensils?.needed?"14px":"0"}}>
              <div style={{color:"#74C2E1",fontWeight:"700"}}>🍴 Utensilios</div>
              <Toggle on={logistics.utensils?.needed||false} onChange={v=>updLogistics({utensils:{...(logistics.utensils||{}),needed:v}})}/>
            </div>
            {logistics.utensils?.needed&&(
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {["Platos","Cubiertos","Vasos","Copas","Servilletas","Fuentes"].map(u=>{const items=logistics.utensils?.items||[];const active=items.includes(u);return <button type="button" translate="no" key={u} onClick={()=>updLogistics({utensils:{...(logistics.utensils||{}),items:active?items.filter(x=>x!==u):[...items,u]}})} style={{padding:"7px 12px",borderRadius:"8px",border:`1px solid ${active?"#74C2E1":"#333"}`,background:active?"#74C2E122":"transparent",color:active?"#74C2E1":"#555",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>{u}</button>;})}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── INVITATION TAB ── */}
      {tab==="invitation"&&(
        <div style={{padding:"16px"}}>
          <div style={{...S.card("#25D36622"),marginBottom:"12px"}}>
            <div style={{color:"#25D366",fontWeight:"700",marginBottom:"14px"}}>✉️ Configuración de Invitación</div>

            <label style={S.label}>Título / Asunto</label>
            <DebouncedInput style={{...S.input,marginBottom:"10px"}} value={inv.title||""} onChange={v=>updInv({title:v})} placeholder={event.name}/>

            <label style={S.label}>Mensaje personalizado</label>
            <DebouncedInput style={{...S.input,marginBottom:"10px"}} value={inv.message||""} onChange={v=>updInv({message:v})} placeholder="Tenemos el agrado de invitarte..."/>

            <label style={S.label}>Vestimenta / Dress code</label>
            <DebouncedInput style={{...S.input,marginBottom:"10px"}} value={inv.dress||""} onChange={v=>updInv({dress:v})} placeholder="Ej: Formal, informal, temático..."/>

            {/* Name format */}
            <label style={S.label}>Cómo dirigirse al invitado</label>
            <div style={{display:"flex",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
              {[["firstName","Solo nombre"],["nickname","Apodo"],["full","Nombre y apellido"],["lastName","Solo apellido"]].map(([id,label])=>(
                <button type="button" translate="no" key={id} onClick={()=>updInv({nameFormat:id})} style={{padding:"7px 12px",borderRadius:"8px",border:`1px solid ${(inv.nameFormat||"firstName")===id?"#25D366":"#333"}`,background:(inv.nameFormat||"firstName")===id?"#25D36622":"transparent",color:(inv.nameFormat||"firstName")===id?"#25D366":"#555",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>{label}</button>
              ))}
            </div>
            {/* Fallback hints per format */}
            <div style={{marginBottom:"12px",padding:"8px 12px",background:"#0d1a0d",borderRadius:"8px",fontSize:"12px",color:"#666",lineHeight:"1.5"}}>
              {(inv.nameFormat||"firstName")==="nickname" && "Si el invitado no tiene apodo cargado, se usa el nombre. Si tampoco tiene nombre, el apellido."}
              {(inv.nameFormat||"firstName")==="firstName" && "Si no tiene nombre, se usa el apodo. Si tampoco, el apellido."}
              {(inv.nameFormat||"firstName")==="full" && "Nombre + apellido. Si falta alguno, se usa el que tenga. Si no tiene ninguno, el apodo."}
              {(inv.nameFormat||"firstName")==="lastName" && "Si no tiene apellido, se usa el nombre. Si tampoco, el apodo."}
            </div>

            {/* What to include */}
            <label style={S.label}>Incluir en la invitación</label>
            <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"12px"}}>
              {[["showDate","📅 Fecha del evento"],["showTime","🕘 Horario"],["showLocation","📍 Lugar"]].map(([k,label])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{color:"#888",fontSize:"13px"}}>{label}</div>
                  <Toggle on={inv[k]!==false} onChange={v=>updInv({[k]:v})}/>
                </div>
              ))}
            </div>

            {/* Send channel */}
            <label style={S.label}>Canal de envío preferido</label>
            <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
              {[["whatsapp","💬 WhatsApp"],["email","✉️ Email"],["both","Ambos"]].map(([id,label])=>(
                <button type="button" translate="no" key={id} onClick={()=>updInv({sendChannel:id})} style={{flex:1,padding:"8px 6px",borderRadius:"8px",border:`1px solid ${(inv.sendChannel||"whatsapp")===id?"#25D366":"#333"}`,background:(inv.sendChannel||"whatsapp")===id?"#25D36622":"transparent",color:(inv.sendChannel||"whatsapp")===id?"#25D366":"#555",fontSize:"11px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>{label}</button>
              ))}
            </div>

            {/* RSVP */}
            <label style={S.label}>Confirmar antes del</label>
            <input translate="no" spellCheck={false} autoCorrect="off" type="date" style={{...S.input,marginBottom:"10px",colorScheme:"dark"}} value={inv.rsvpDeadline||""} onChange={e=>updInv({rsvpDeadline:e.target.value})}/>

            <label style={S.label}>WhatsApp para confirmaciones (con código país)</label>
            <DebouncedInput style={S.input} value={inv.rsvpWhatsapp||""} onChange={v=>updInv({rsvpWhatsapp:v})} placeholder="Ej: 5493413001234" type="tel"/>

            <div style={{marginTop:"10px",padding:"10px 12px",background:"#0d1a0d",borderRadius:"8px"}}>
              <div style={{color:"#25D366",fontSize:"11px",fontWeight:"700",marginBottom:"4px"}}>💡 Confirmación automática</div>
              <div style={{color:"#666",fontSize:"12px",lineHeight:"1.5"}}>La invitación incluye dos links de respuesta rápida: ✅ "Confirmo asistencia" y ❌ "No puedo ir". Cuando el invitado toca el link, se abre WhatsApp con el mensaje ya escrito dirigido a tu número. Vos actualizás el estado en la app manualmente.</div>
            </div>
          </div>

          {/* Preview */}
          {guests.length>0&&(
            <div style={{...S.card("#1a1a1a"),marginBottom:"12px"}}>
              <div style={{color:"#888",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"10px"}}>VISTA PREVIA — {displayName(guests[0])}</div>
              <div style={{color:"#ccc",fontSize:"12px",lineHeight:"1.7",whiteSpace:"pre-wrap",fontFamily:"monospace"}}>{buildInvText(guests[0])}</div>
            </div>
          )}

          {/* Send to all */}
          <div style={{marginTop:"4px"}}>
            <div style={{color:"#888",fontSize:"11px",fontWeight:"700",letterSpacing:"2px",marginBottom:"10px"}}>ENVIAR INVITACIONES</div>
            {guests.filter(g=>g.whatsapp||g.email).map(g=>{
              const name=displayName(g);
              const fmt=inv.nameFormat||"firstName";
              // Detect if fallback was used
              const usingFallback=(fmt==="nickname"&&!g.nickname)||(fmt==="lastName"&&!g.lastName)||(fmt==="full"&&(!g.firstName&&!g.lastName));
              return(
              <div key={g.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",marginBottom:"6px",background:"#111",borderRadius:"10px",border:`1px solid ${usingFallback?"#FFD70033":"#1a1a1a"}`}}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"#FF6B9D33",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF6B9D",fontWeight:"900",fontSize:"12px",flexShrink:0}}>{(g.firstName||g.nickname||"?").charAt(0).toUpperCase()}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                    <span style={{color:"#fff",fontSize:"13px",fontWeight:"600"}}>{name}</span>
                    {usingFallback&&<span style={{color:"#FFD700",fontSize:"10px",fontWeight:"700",padding:"1px 6px",background:"#FFD70022",borderRadius:"4px"}}>usa nombre</span>}
                  </div>
                  <div style={{color:"#555",fontSize:"11px"}}>{g.confirmed===true?"✅ Confirmado":g.confirmed===false?"❌ Declinó":"⏳ Pendiente"}</div>
                </div>
                <button type="button" translate="no" onClick={()=>sendInvitation(g)} style={{padding:"7px 14px",borderRadius:"8px",border:"none",background:"#25D366",color:"#000",fontWeight:"800",fontSize:"12px",cursor:"pointer"}}>Enviar</button>
              </div>
            );})}
            {guests.filter(g=>!g.whatsapp&&!g.email).length>0&&<div style={{color:"#444",fontSize:"12px",marginTop:"6px"}}>{guests.filter(g=>!g.whatsapp&&!g.email).length} invitados sin contacto guardado.</div>}
          </div>
        </div>
      )}
    </div>
  );
}

            value={state.unit} onChange={e=>setState(s=>({...s,unit:e.target.value}))}>
            {units.map(u=><option key={u} value={u}>{u}</option>)}

      <button type="button" onClick={onAdd}
        style={{width:"100%",padding:"10px",borderRadius:"10px",border:"none",background:color,color:["#FFD700","#A8FF78","#1DB954"].includes(color)?"#000":"#fff",fontWeight:"800",fontSize:"13px",cursor:"pointer",fontFamily:"inherit"}}>

function CateringPage({event,onChange}){
  const [tab,setTab]=useState("analysis");
  const [newFood,setNewFood]=useState({name:"",perAdult:"",perChild:"",unit:"g"});
  const [newDrink,setNewDrink]=useState({name:"",perAdult:"",perChild:"",unit:"ml"});
  const [showPriceModal,setShowPriceModal]=useState(false);
  const [exportWithPrice,setExportWithPrice]=useState(true);

  const guests=event.guestList||[];
  const confirmed=guests.filter(g=>g.confirmed===true);
  const totalPeople=confirmed.reduce((s,g)=>s+1+(parseInt(g.companions)||0),0)||guests.length||20;
  const logistics=event.logistics||{};
  const children=guests.filter(g=>g.ageGroup==="child").length;
  const teens=guests.filter(g=>g.ageGroup==="teen").length;
  const adults=guests.filter(g=>["adult","senior"].includes(g.ageGroup)).length;
  const serviceType=logistics.serviceType||"bandejeado";
  const multiplier={bandejeado:1,mesa_servida:1.2,buffet:1.4,picada:0.8,otro:1}[serviceType]||1;

  // Custom items and enabled state
  const customFood=event.cateringCustomFood||[];
  const customDrinks=event.cateringCustomDrinks||[];
  const enabled=event.cateringEnabled||{}; // key -> false means disabled
  const prices=event.cateringPrices||{};   // key -> price per unit

  const isEnabled=(key)=>enabled[key]!==false;
  const toggleEnabled=(key)=>onChange({...event,cateringEnabled:{...enabled,[key]:!isEnabled(key)}});
  const setPrice=(key,val)=>onChange({...event,cateringPrices:{...prices,[key]:val}});

  const updCustomFood=(f)=>onChange({...event,cateringCustomFood:f});
  const updCustomDrinks=(d)=>onChange({...event,cateringCustomDrinks:d});

  const foodItems=[
    {cat:"🥩 Carnes",items:[
      {key:"carne_vacuna",name:"Carne vacuna",perAdult:250,perChild:150,unit:"g"},
      {key:"pollo",name:"Pollo",perAdult:200,perChild:130,unit:"g"},
      {key:"cerdo",name:"Cerdo / bondiola",perAdult:180,perChild:100,unit:"g"},
    ]},
    {cat:"🥗 Ensaladas y guarniciones",items:[
      {key:"ensalada",name:"Ensalada mixta",perAdult:150,perChild:80,unit:"g"},
      {key:"papa",name:"Papa / vegetales",perAdult:200,perChild:120,unit:"g"},
    ]},
    {cat:"🧀 Picada",items:[
      {key:"queso",name:"Quesos surtidos",perAdult:80,perChild:40,unit:"g"},
      {key:"fiambre",name:"Fiambres",perAdult:80,perChild:40,unit:"g"},
      {key:"pan",name:"Pan / tostadas",perAdult:60,perChild:40,unit:"g"},
    ]},
    {cat:"🎂 Postre",items:[
      {key:"torta",name:"Torta (porciones)",perAdult:1,perChild:1,unit:"porc."},
      {key:"dulces",name:"Dulces / bombones",perAdult:50,perChild:30,unit:"g"},
    ]},
  ];
  const drinkItems=[
    {key:"vino",name:"Vino",perAdult:200,perChild:0,unit:"ml"},
    {key:"cerveza",name:"Cerveza",perAdult:330,perChild:0,unit:"ml"},
    {key:"gaseosa",name:"Gaseosa",perAdult:250,perChild:300,unit:"ml"},
    {key:"agua",name:"Agua mineral",perAdult:300,perChild:300,unit:"ml"},
    {key:"jugo",name:"Jugo / sin alcohol",perAdult:150,perChild:300,unit:"ml"},
    {key:"champagne",name:"Champagne (brindis)",perAdult:120,perChild:0,unit:"ml"},
  ];

  const calcQty=(perAdult,perChild)=>Math.ceil((adults+teens)*perAdult*multiplier)+Math.ceil(children*(perChild||0));

  const formatQty=(qty,unit)=>{
    if(unit==="g"&&qty>=1000) return `${(qty/1000).toFixed(1)} kg`;
    if(unit==="ml"&&qty>=1000) return `${(qty/1000).toFixed(1)} L`;
    if(unit==="porc.") return `${qty} porciones`;
    return `${qty} ${unit}`;
  };

  const addCustomFood=()=>{
    if(!newFood.name.trim()||!newFood.perAdult) return;
    const item={id:uid(),key:`cf_${uid()}`,name:newFood.name,perAdult:parseFloat(newFood.perAdult)||0,perChild:parseFloat(newFood.perChild)||0,unit:newFood.unit};
    updCustomFood([...customFood,item]);
    setNewFood({name:"",perAdult:"",perChild:"",unit:"g"});
  };
  const addCustomDrink=()=>{
    if(!newDrink.name.trim()||!newDrink.perAdult) return;
    const item={id:uid(),key:`cd_${uid()}`,name:newDrink.name,perAdult:parseFloat(newDrink.perAdult)||0,perChild:parseFloat(newDrink.perChild)||0,unit:newDrink.unit};
    updCustomDrinks([...customDrinks,item]);
    setNewDrink({name:"",perAdult:"",perChild:"",unit:"ml"});
  };

  // CSV export — no library needed, Excel opens it directly
  const exportExcel=(withPrice)=>{
    const esc=(v)=>`"${String(v||"").replace(/"/g,'""')}"`;
    const rows=[];
    rows.push([esc("LISTA DE COMPRAS — "+event.name)]);
    rows.push([esc(`Personas: ${totalPeople} · Servicio: ${serviceType} · Multiplicador: ${multiplier}x`)]);
    rows.push([]);
    if(withPrice) rows.push([esc("Ítem"),esc("Cantidad"),esc("Unidad"),esc("Precio unit."),esc("Total estimado")]);
    else           rows.push([esc("Ítem"),esc("Cantidad"),esc("Unidad")]);

    const addSection=(title,items)=>{
      rows.push([esc(title)]);
      items.forEach(item=>{
        if(!isEnabled(item.key)) return;
        const qty=calcQty(item.perAdult,item.perChild);
        const dQty=item.unit==="g"&&qty>=1000?(qty/1000).toFixed(2):item.unit==="ml"&&qty>=1000?(qty/1000).toFixed(2):qty;
        const dUnit=item.unit==="g"&&qty>=1000?"kg":item.unit==="ml"&&qty>=1000?"L":item.unit;
        const price=parseFloat(prices[item.key])||0;
        const total=price>0?(price*parseFloat(dQty)).toFixed(2):"";
        if(withPrice) rows.push([esc(item.name),dQty,esc(dUnit),price||"",total]);
        else           rows.push([esc(item.name),dQty,esc(dUnit)]);
      });
      rows.push([]);
    };

    rows.push([esc("🍽 COMIDAS")]);
    foodItems.forEach(cat=>addSection(cat.cat,cat.items));
    if(customFood.length>0) addSection("✏️ Personalizados",customFood);

    rows.push([esc("🍺 BEBIDAS")]);
    addSection("Bebidas",drinkItems);
    if(customDrinks.length>0) addSection("✏️ Personalizadas",customDrinks);

    if(withPrice){
      const allItems=[...foodItems.flatMap(c=>c.items),...customFood,...drinkItems,...customDrinks];
      const grandTotal=allItems.filter(it=>isEnabled(it.key)).reduce((s,item)=>{
        const qty=calcQty(item.perAdult,item.perChild);
        const dQty=item.unit==="g"&&qty>=1000?qty/1000:item.unit==="ml"&&qty>=1000?qty/1000:qty;
        return s+(parseFloat(prices[item.key])||0)*dQty;
      },0);
      rows.push([esc("TOTAL ESTIMADO"),"","","",grandTotal.toFixed(2)]);
    }

    const csv=rows.map(r=>r.join(",")).join("\n");
    const bom="\uFEFF"; // UTF-8 BOM for Excel
    const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`compras_${event.name.replace(/[^a-z0-9]/gi,"_")}.csv`;
    a.click();
    setShowPriceModal(false);
  };

  const contextBanner=(
    <div style={{margin:"14px 16px 0",padding:"12px 14px",background:"#1a0e00",border:"1px solid #E8704033",borderRadius:"12px"}}>
      <div style={{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:"6px"}}>
        <div style={{textAlign:"center"}}><div style={{color:"#E87040",fontWeight:"900",fontSize:"18px"}}>{totalPeople}</div><div style={{color:"#666",fontSize:"10px"}}>Personas</div></div>
        <div style={{textAlign:"center"}}><div style={{color:"#74C2E1",fontWeight:"900",fontSize:"18px"}}>×{multiplier}</div><div style={{color:"#666",fontSize:"10px"}}>{({bandejeado:"Bandejeado",mesa_servida:"Mesa servida",buffet:"Buffet",picada:"Picada",otro:"Otro"}[serviceType])}</div></div>
        <div style={{textAlign:"center"}}><div style={{color:"#A8FF78",fontWeight:"900",fontSize:"18px"}}>{adults+teens}</div><div style={{color:"#666",fontSize:"10px"}}>Adultos</div></div>
        <div style={{textAlign:"center"}}><div style={{color:"#FF6B9D",fontWeight:"900",fontSize:"18px"}}>{children}</div><div style={{color:"#666",fontSize:"10px"}}>Menores</div></div>
        <div style={{marginLeft:"auto"}}>
          <button type="button" onClick={()=>setShowPriceModal(true)}
            style={{padding:"8px 14px",borderRadius:"10px",border:"none",background:"#A8FF78",color:"#000",fontWeight:"800",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>
            📊 Exportar Excel
          </button>
        </div>
      </div>
      <div style={{color:"#555",fontSize:"11px"}}>Usá los toggles para marcar los ítems que vas a usar. Los desmarcados no se exportan.</div>
    </div>
  );

  // Price modal
  const priceModal=showPriceModal&&(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>

  const guests=event.guestList||[];
  const confirmed=guests.filter(g=>g.confirmed===true);
  const totalPeople=confirmed.reduce((s,g)=>s+1+(parseInt(g.companions)||0),0)||guests.length||20;
  const logistics=event.logistics||{};

  const children=guests.filter(g=>g.ageGroup==="child").length;
  const teens=guests.filter(g=>g.ageGroup==="teen").length;
  const adults=guests.filter(g=>["adult","senior"].includes(g.ageGroup)).length;

  const serviceType=logistics.serviceType||"bandejeado";
  const multiplier={bandejeado:1,mesa_servida:1.2,buffet:1.4,picada:0.8,otro:1}[serviceType]||1;

  // Custom items stored in event
  const customFood=event.cateringCustomFood||[];
  const customDrinks=event.cateringCustomDrinks||[];
  const updCustomFood=(f)=>onChange({...event,cateringCustomFood:f});
  const updCustomDrinks=(d)=>onChange({...event,cateringCustomDrinks:d});

  const foodItems=[
    {cat:"🥩 Carnes",items:[
      {name:"Carne vacuna",perAdult:250,perChild:150,unit:"g"},
      {name:"Pollo",perAdult:200,perChild:130,unit:"g"},
      {name:"Cerdo / bondiola",perAdult:180,perChild:100,unit:"g"},
    ]},
    {cat:"🥗 Ensaladas y guarniciones",items:[
      {name:"Ensalada mixta",perAdult:150,perChild:80,unit:"g"},
      {name:"Papa / vegetales",perAdult:200,perChild:120,unit:"g"},
    ]},
    {cat:"🧀 Picada",items:[
      {name:"Quesos surtidos",perAdult:80,perChild:40,unit:"g"},
      {name:"Fiambres",perAdult:80,perChild:40,unit:"g"},
      {name:"Pan / tostadas",perAdult:60,perChild:40,unit:"g"},
    ]},
    {cat:"🎂 Postre",items:[
      {name:"Torta (porciones)",perAdult:1,perChild:1,unit:"porc."},
      {name:"Dulces / bombones",perAdult:50,perChild:30,unit:"g"},
    ]},
  ];

  const drinkItems=[
    {name:"Vino",perAdult:200,perChild:0,unit:"ml"},
    {name:"Cerveza",perAdult:330,perChild:0,unit:"ml"},
    {name:"Gaseosa",perAdult:250,perChild:300,unit:"ml"},
    {name:"Agua mineral",perAdult:300,perChild:300,unit:"ml"},
    {name:"Jugo / bebida sin alcohol",perAdult:150,perChild:300,unit:"ml"},
    {name:"Champagne (brindis)",perAdult:120,perChild:0,unit:"ml"},
  ];

  const calcQty=(perAdult,perChild)=>{
    const a=Math.ceil((adults+teens)*perAdult*multiplier);
    const c=Math.ceil(children*(perChild||0));
    return a+c;
  };
  const formatQty=(qty,unit)=>{
    if(unit==="g"&&qty>=1000) return `${(qty/1000).toFixed(1)} kg`;
    if(unit==="ml"&&qty>=1000) return `${(qty/1000).toFixed(1)} L`;
    if(unit==="porc.") return `${qty} porciones`;
    return `${qty} ${unit}`;
  };

function RSVPFormPage(){
  const p = new URLSearchParams(window.location.search);
  const eventName = decodeURIComponent(p.get("ev")||"el evento");
  const guestName = decodeURIComponent(p.get("gn")||"");
  const orgWA     = (p.get("wano")||"").replace(/\D/g,"");
  const eventDate = decodeURIComponent(p.get("dt")||"");
  const location  = decodeURIComponent(p.get("loc")||"");
  const timeStr   = decodeURIComponent(p.get("tm")||"");
  const bgVal     = decodeURIComponent(p.get("bg")||"linear-gradient(135deg,#1a0a2e,#0f3460)");

  const [answer,setAnswer]   = useState(null); // "si" | "no"
  const [reason,setReason]   = useState("");
  const [sent,setSent]       = useState(false);

  const send=()=>{
    if(!answer) return;
    const emoji = answer==="si" ? "✅" : "❌";
    const status = answer==="si" ? "CONFIRMA ASISTENCIA" : "NO PUEDE ASISTIR";
    const lines = [
      `${emoji} *RSVP — ${eventName}*`,
      `👤 ${guestName||"Invitado/a"}: ${status}`,
      reason ? `💬 Motivo: ${reason}` : "",
    ].filter(Boolean);
    const msg = lines.join("\n");
    if(orgWA){
      window.open(`https://wa.me/${orgWA}?text=${encodeURIComponent(msg)}`,"_blank");
    }
    setSent(true);
  };

  const bgStyle = bgVal.startsWith("http") || bgVal.startsWith("https")
    ? {backgroundImage:`url(${bgVal})`, backgroundSize:"cover", backgroundPosition:"center"}
    : {background:bgVal};

  return(
    <div style={{minHeight:"100vh", ...bgStyle, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px"}}>
      <div style={{maxWidth:"400px", width:"100%", background:"rgba(0,0,0,0.6)", backdropFilter:"blur(10px)", borderRadius:"20px", padding:"32px 24px", boxShadow:"0 8px 40px rgba(0,0,0,0.6)"}}>

        {!sent ? (<>
          {/* Event info */}
          <div style={{textAlign:"center", marginBottom:"24px"}}>
            <div style={{fontSize:"36px", marginBottom:"10px"}}>🎉</div>
            <div style={{color:"#FFD700", fontSize:"22px", fontWeight:"900", fontFamily:"'Playfair Display',serif", marginBottom:"8px", lineHeight:1.2}}>{eventName}</div>
            {guestName && <div style={{color:"#ccc", fontSize:"15px", marginBottom:"6px"}}>Hola, <strong style={{color:"#fff"}}>{guestName}</strong>!</div>}
            <div style={{display:"flex", gap:"12px", justifyContent:"center", flexWrap:"wrap", marginTop:"10px"}}>
              {eventDate && <span style={{color:"#aaa", fontSize:"13px"}}>📅 {eventDate}</span>}
              {timeStr   && <span style={{color:"#aaa", fontSize:"13px"}}>🕘 {timeStr}</span>}
              {location  && <span style={{color:"#aaa", fontSize:"13px"}}>📍 {location}</span>}
            </div>
          </div>

          {/* Question */}
          <div style={{color:"#fff", fontWeight:"700", fontSize:"16px", textAlign:"center", marginBottom:"16px"}}>¿Podés asistir?</div>

          {/* Buttons */}
          <div style={{display:"flex", gap:"12px", marginBottom:"16px"}}>
            <button type="button" translate="no" onClick={()=>setAnswer("si")}
              style={{flex:1, padding:"16px 10px", borderRadius:"14px", border:`2px solid ${answer==="si"?"#1DB954":"#444"}`, background:answer==="si"?"#1DB954":"rgba(255,255,255,0.05)", color:answer==="si"?"#000":"#fff", fontSize:"15px", fontWeight:"800", cursor:"pointer", transition:"all 0.2s"}}>
              ✅ Confirmo asistencia
            </button>
            <button type="button" translate="no" onClick={()=>setAnswer("no")}
              style={{flex:1, padding:"16px 10px", borderRadius:"14px", border:`2px solid ${answer==="no"?"#ff4444":"#444"}`, background:answer==="no"?"#ff4444":"rgba(255,255,255,0.05)", color:answer==="no"?"#fff":"#fff", fontSize:"15px", fontWeight:"800", cursor:"pointer", transition:"all 0.2s"}}>
              ❌ No puedo ir
            </button>
          </div>

          {/* Reason field — always visible but labeled contextually */}
          <div style={{marginBottom:"16px"}}>
            <div style={{color:"#888", fontSize:"12px", fontWeight:"700", letterSpacing:"2px", marginBottom:"8px"}}>
              {answer==="no" ? "MOTIVO (OPCIONAL)" : "MENSAJE PARA EL ORGANIZADOR (OPCIONAL)"}
            </div>
            <DebouncedTextarea
              value={reason}
              onChange={v=>setReason(v)}
              placeholder={answer==="no" ? "Ej: Tengo un compromiso ese día..." : "Ej: ¡Cuántas ganas! Voy con mi pareja..."}
              style={{width:"100%", minHeight:"80px", padding:"12px 14px", borderRadius:"10px", border:"1.5px solid #333", background:"rgba(0,0,0,0.4)", color:"#fff", fontSize:"14px", fontFamily:"'DM Sans',sans-serif", resize:"vertical", outline:"none", boxSizing:"border-box"}}
            />
          </div>

          {/* Send button */}
          <button type="button" translate="no" onClick={send} disabled={!answer}
            style={{width:"100%", padding:"16px", borderRadius:"14px", border:"none", background:answer?"#25D366":"#333", color:answer?"#000":"#666", fontWeight:"900", fontSize:"16px", cursor:answer?"pointer":"not-allowed", display:"flex", alignItems:"center", justifyContent:"center", gap:"10px", fontFamily:"'DM Sans',sans-serif"}}>
            <span>💬</span> Enviar respuesta por WhatsApp
          </button>

          {!orgWA && <div style={{color:"#ff6666", fontSize:"12px", textAlign:"center", marginTop:"8px"}}>⚠️ Sin número de WhatsApp configurado</div>}
        </>) : (
          /* Sent confirmation */
          <div style={{textAlign:"center", padding:"20px 0"}}>
            <div style={{fontSize:"60px", marginBottom:"16px"}}>{answer==="si"?"🎉":"💌"}</div>
            <div style={{color:"#FFD700", fontSize:"22px", fontWeight:"900", fontFamily:"'Playfair Display',serif", marginBottom:"12px"}}>
              {answer==="si" ? "¡Nos vemos ahí!" : "¡Gracias por avisarnos!"}
            </div>
            <div style={{color:"#aaa", fontSize:"14px", lineHeight:"1.6"}}>
              {answer==="si"
                ? "Tu confirmación fue enviada. El organizador ya sabe que vas a estar. 🥂"
                : "Tu respuesta fue enviada. ¡Esperamos verte en otra oportunidad!"}
            </div>
            <button type="button" translate="no" onClick={()=>window.close()}
              style={{marginTop:"20px", padding:"12px 24px", borderRadius:"10px", border:"1px solid #555", background:"transparent", color:"#888", fontWeight:"700", cursor:"pointer", fontFamily:"'DM Sans',sans-serif"}}>
              Cerrar
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const buildRsvpLink=(event, guestName="")=>{
  const base=window.location.href.split("?")[0].split("#")[0];
  const inv=event.invitation||{};
  const card=event.card||{};
  const bg=card.bg?.imageUrl||card.bg?.value||"";
  const params=new URLSearchParams({
    rsvp:"1",
    ev:event.name||"",
    gn:guestName,
    wano:inv.rsvpWhatsapp||"",
    dt:event.eventDate?fmtDate(event.eventDate):"",
    loc:event.location||"",
    tm:event.timeFrom?`${event.timeFrom} hs`:"",
    bg:bg.slice(0,200),
  });
  return `${base}?${params.toString()}`;
};

];

// Resolve content for a col
// ─── DATE/TIME FORMATTERS ─────────────────────────────────────────
const formatDate=(dateStr, fmt)=>{
  if(!dateStr) return "";
  const d=new Date(dateStr+"T12:00");
  const dd=String(d.getDate()).padStart(2,"0");
  const mmm=d.toLocaleDateString("es-AR",{month:"short"}).replace(".","").toUpperCase();
  const mmmLow=d.toLocaleDateString("es-AR",{month:"long"});
  const mm=String(d.getMonth()+1).padStart(2,"0");
  const yyyy=d.getFullYear();
  switch(fmt){
    case "dd-mmm-yyyy": return `${dd}\n${mmm}\n${yyyy}`;
    case "dd/mm/yyyy":  return `${dd}/${mm}/${yyyy}`;
    case "dd de mes":   return `${dd} de ${mmmLow} de ${yyyy}`;
    case "mes dd":      return `${mmmLow} ${dd}, ${yyyy}`;
    case "corta":       return `${dd}/${mm}`;
    default:            return `${dd}\n${mmm}\n${yyyy}`; // 3 líneas centradas por defecto
  }
};
const formatTime=(timeStr, fmt)=>{
  if(!timeStr) return "";
  const [h,m]=timeStr.split(":").map(Number);
  const pad=(n)=>String(n).padStart(2,"0");
  switch(fmt){
    case "2lineas": return `${pad(h)}:${pad(m)}\nhs.`;
    case "12h":     return `${h>12?h-12:h||12}:${pad(m)} ${h>=12?"PM":"AM"}`;
    case "aprox":   return `${pad(h)}:${pad(m)} hs.`;
    default:        return `${pad(h)}:${pad(m)}\nhs.`;
  }
};

// Renders a field that may have multiple lines with per-line styling
// For date: line0=DD big bold, line1=MMM medium, line2=YYYY small
// For time: line0=HH:MM big bold, line1="hs." small
const renderMultiLine=(text,col,isDate,isTime)=>{
  if(!text||(!isDate&&!isTime)||!text.includes("\n")) return text;
  const lines=text.split("\n");
  const base=col.fontSize||20;
  if(isDate){
    const defaults=[
      {size:Math.round(base*1.4),weight:"900"},
      {size:Math.round(base*0.85),weight:"600"},
      {size:Math.round(base*0.75),weight:"400"},
    ];
    const cfgs=col.dateLines||defaults;
    return lines.map((l,i)=>({line:l,size:(cfgs[i]||defaults[i]||{}).size||base,weight:(cfgs[i]||defaults[i]||{}).weight||"400"}));
  }
  if(isTime){
    const defaults=[
      {size:base,weight:col.fontWeight||"700"},
      {size:Math.round(base*0.55),weight:"400"},
    ];
    const cfgs=col.timeLines||defaults;
    return lines.map((l,i)=>({line:l,size:(cfgs[i]||defaults[i]||{}).size||base,weight:(cfgs[i]||defaults[i]||{}).weight||"400"}));
  }
  return text;
};

const resolveContent=(col,event,inv,logistics)=>{
  const dateFmt=event.card?.dateFormat||"dd-mmm-yyyy";
  const timeFmt=event.card?.timeFormat||"2lineas";
  if(col.content==="eventName") return event.name||"";
  if(col.content==="greeting")  return inv.message||`¡Tenemos el agrado de invitarte!`;
  if(col.content==="date")      return formatDate(event.eventDate,dateFmt);
  if(col.content==="time")      return formatTime(event.timeFrom,timeFmt);
  if(col.content==="location")  return event.location||"";
  if(col.content==="dress")     return inv.dress?`👗 ${inv.dress}`:"";
  if(col.content==="music")     return event.card?.music?.title?`🎵 ${event.card.music.title}`:"";
  if(col.content==="rsvp")      return inv.rsvpDeadline?`Confirmá antes del ${fmtDate(inv.rsvpDeadline)}`:(inv.rsvpWhatsapp?`RSVP: ${inv.rsvpWhatsapp}`:"");
  if(col.content==="serviceType"){
    const st=logistics.serviceType;
    return st?{bandejeado:"🥂 Servicio bandejeado",mesa_servida:"🍽 Mesa servida",buffet:"🍴 Buffet libre",picada:"🧀 Picada",otro:logistics.brindis||""}[st]||st:"";
  }
  if(col.content==="payment"){
    const p=logistics.payment;
    if(!p||p.type==="free") return "🎟 Entrada libre";
    const methods=(p.methods||[]).join(", ");
    return p.type==="full"?`💳 Entrada: $${p.amount||0}${methods?" · "+methods:""}`:`💳 Contribución: $${p.amount||0}${methods?" · "+methods:""}`;
  }
  if(col.content==="alasBolsa"){
    const ab=logistics.alasBolsa;
    if(!ab?.enabled) return "";
    const items=[ab.bebida&&"🍺 bebida",ab.comida&&"🍕 comida"].filter(Boolean).join(" y ");
    return items?`🛍 A la bolsa: ${items}${ab.notes?" ("+ab.notes+")":""}`:ab.notes||"";
  }
  if(col.content==="utensils"){
    const u=logistics.utensils;
    if(!u?.needed||!(u.items||[]).length) return "";
    return `🍴 Traer: ${u.items.join(", ")}`;
  }
  if(col.content==="custom")    return col.text||"";
  if(col.content==="divider"||col.content==="empty") return null;
  return "";
};

function CardPreview({event,card}){
  const c=card||{};
  const inv=event.invitation||{};
  const logistics=event.logistics||{};
  const rows=c.rows&&c.rows.length>0?c.rows:defaultCardRows();
  const bgStyle=c.bg?.imageUrl?{backgroundImage:`url(${c.bg.imageUrl})`,backgroundSize:"cover",backgroundPosition:"center"}:{background:c.bg?.value||CARD_BG_PRESETS[0].value};
  const font=c.font||"Playfair Display";
  const compact=c.compact||false;
  const cardPad=compact?16:24;

  return(
    <div style={{...bgStyle,borderRadius:"14px",padding:`${cardPad}px ${cardPad}px`,position:"relative",overflow:"hidden",boxShadow:"0 6px 30px #00000088",fontFamily:font,minWidth:0}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.25)",borderRadius:"14px"}}/>
      {c.music?.enabled&&c.music?.title&&(
        <div style={{position:"absolute",top:"8px",right:"8px",padding:"3px 8px",background:"#1DB95488",borderRadius:"16px",color:"#1DB954",fontSize:"9px",fontWeight:"700",zIndex:2}}>🎵 {c.music.title}</div>
      )}
      <div style={{position:"relative",zIndex:1}}>
        {rows.map((row,ri)=>(
          <div key={row.id||ri} style={{marginBottom:`${row.spacing||0}px`}}>
            {/* Full-width divider */}
            {row.cols.length===1&&row.cols[0].content==="divider"?(
              <div style={{height:"1px",background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent)"}}/>
            ):row.cols.length===1&&row.cols[0].content==="empty"?(
              <div style={{height:`${row.spacing||12}px`}}/>
            ):(
              <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                {row.cols.map((col,ci)=>{
                  const text=resolveContent(col,event,inv,logistics);
                  if(col.content==="divider") return <div key={col.id||ci} style={{flex:col.flex||1,height:"1px",background:"rgba(255,255,255,0.3)"}}/>;
                  if(col.content==="empty"||!text) return <div key={col.id||ci} style={{flex:col.flex||1}}/>;
                  const isDate=col.content==="date";
                  const isTime=col.content==="time";
                  const rendered=renderMultiLine(text,col,isDate,isTime);
                  const isMulti=Array.isArray(rendered);
                  return(
                    <div key={col.id||ci} style={{flex:col.flex||1,minWidth:0,
                      textAlign:col.align||"left",
                      fontStyle:col.italic?"italic":"normal",
                      color:col.color||"#fff",
                      fontFamily:c.font||"Playfair Display",
                    }}>
                      {isMulti ? rendered.map((lr,li)=>(
                        <div key={li} style={{fontSize:`${lr.size}px`,fontWeight:lr.weight,lineHeight:col.lineHeight||1.2}}>{lr.line}</div>
                      )) : (
                        <div style={{fontSize:`${col.fontSize||14}px`,fontWeight:col.fontWeight||"400",lineHeight:col.lineHeight||1.3,wordBreak:"break-word",whiteSpace:"pre-line"}}>{rendered}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function ColEditor({col, onUpdate, color="#FFD700", onDelete, canDelete}){

  const base=col.fontSize||20;

  // Per-line defaults
  const dateLinesDefault=[
    {size:Math.round(base*1.4),weight:"900"},
    {size:Math.round(base*0.85),weight:"600"},
    {size:Math.round(base*0.75),weight:"400"},
  ];
  const timeLinesDefault=[
    {size:base,weight:"700"},
    {size:Math.round(base*0.55),weight:"400"},
  ];

  const isMultiDate=col.content==="date";
  const isMultiTime=col.content==="time";

  const updDateLine=(i,k,v)=>{
    const lines=[...(col.dateLines||dateLinesDefault)];
    lines[i]={...lines[i],[k]:v};
    onUpdate("dateLines",lines);
  };
  const updTimeLine=(i,k,v)=>{
    const lines=[...(col.timeLines||timeLinesDefault)];
    lines[i]={...lines[i],[k]:v};
    onUpdate("timeLines",lines);
  };

  return(
    <div style={{background:"#0d0d0d",borderRadius:"10px",padding:"10px",border:`1px solid ${color}33`,marginBottom:"6px"}}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"6px"}}>

              {WEIGHTS.map(([v,l])=><option key={v} value={v}>{l}</option>)}

          </div>

            <div style={{color:"#555",fontSize:"9px",fontWeight:"700",letterSpacing:"1px",marginBottom:"3px"}}>INTERL.</div>
            <select translate="no" style={{...S.input,padding:"5px 6px",fontSize:"11px"}} value={col.lineHeight||1.3} onChange={e=>onUpdate("lineHeight",parseFloat(e.target.value))}>

            </select>
          </div>
        </div>
      </>)}
    </div>
  );
